apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
# stringData is author-friendly: you write the value in plaintext and Kubernetes
# base64-encodes it into .data on write. base64 is ENCODING, not encryption — what
# protects this object is RBAC (who can 'get secret') + platform etcd encryption at rest.
stringData:
  api-token: "s3cr3t-plaintext-token"
