apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-c03-secrets-management
  labels:
    academy.dcs/track: security
    academy.dcs/order: "30"
    dcs.airbus.com/lifecycle: dev
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  title: Secrets Management on DCS
  description: Spot secrets leaking through images, logs, and env dumps; move a credential into a Kubernetes Secret sourced by reference; and verify it is no longer exposed.
  duration: 40m
  difficulty: intermediate
  labels:
    - name: module
      value: "C-Security"
  publish:
    image: "$(image_repository)/lab-c03-secrets-management-files:$(workshop_version)"
    files:
    - directory:
        path: .
      includePaths:
      - /workshop/**
      - /exercises/**
      - /README.md
  workshop:
    # Manifest/env workshop: all work is oc against the session namespace on local
    # manifests (a leaky Deployment, a Secret, a fixed Deployment). No image build or
    # push, no live registry needed. Runs on dcs-workshop-base, NOT dcs-tools.
    image: "{{ .Values.workshopImages.base }}"
    files:
    {{- if .Values.workshopContent.useGit }}
    - git:
        url: "{{ .Values.workshopContent.gitUrl }}"
        ref: "{{ .Values.workshopContent.gitRef }}"
      includePaths:
      - "{{ .Values.workshopContent.tracksRoot }}/security-track/lab-c03-secrets-management/workshop/**"
      - "{{ .Values.workshopContent.tracksRoot }}/security-track/lab-c03-secrets-management/exercises/**"
      - "{{ .Values.workshopContent.tracksRoot }}/security-track/lab-c03-secrets-management/README.md"
      newRootPath: "{{ trimPrefix "/" .Values.workshopContent.tracksRoot }}/security-track/lab-c03-secrets-management"
    {{- else }}
    - image:
        url: "$(image_repository)/lab-c03-secrets-management-files:$(workshop_version)"
    {{- end }}
  session:
    # DCS_REGISTRY is the single terminal/manifest source for the sample-image
    # registry (Plane 3). Keep it in sync with dcs_registry in workshop/config.yaml,
    # which is the content-rendering copy. Placeholder value — re-pointable per deploy.
    # The sample image (hello-dcs) is pulled from Harbor by the cluster at rollout time;
    # the credentials for that pull are provisioned at deploy time, not hardcoded here.
    env:
    - name: DCS_REGISTRY
      value: "harbor.example.dcs/dcs-academy"
    namespaces:
      budget: medium
      security:
        token:
          enabled: true
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      console:
        enabled: true
      examiner:
        enabled: true
      # Native OpenShift session namespace — no per-session vcluster needed.
      vcluster:
        enabled: false
