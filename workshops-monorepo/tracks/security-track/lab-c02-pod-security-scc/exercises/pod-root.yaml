apiVersion: v1
kind: Pod
metadata:
  name: hello-root
  labels:
    app: hello-root
spec:
  containers:
  - name: hello-root
    # Same image as the compliant Pod — only the securityContext differs.
    image: ${DCS_REGISTRY}/samples/hello-dcs:1.0
    ports:
    - containerPort: 8080
    # This asks to run as root (UID 0) in a privileged container with no
    # restrictions — a direct violation of the restricted policy. Admission
    # rejects it. You fix this block on page 04.
    securityContext:
      runAsUser: 0
      privileged: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 64Mi
