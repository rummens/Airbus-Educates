<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DCS Academy — slides</title>
<!-- Self-contained on purpose: no external/CDN assets (DCS is air-gapped) and no
     dependency on the platform's reveal.js wiring. It fetches a sibling slides.md,
     splits it into one slide per "---" separator, and renders a small markdown
     subset. The SAME file renders in the workshop session (Educates serves this
     directory) and in the portal (which serves this directory outside a session),
     because slides.md is fetched with a relative URL.
     Authoring lives in slides.md, one slide per lab page. See the top of slides.md
     for the id-comment convention and the supported markdown subset. -->
<style>
  :root { --navy:#00205b; --blue:#00a1de; --ink:#0f1720; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; }
  body {
    font-family: system-ui, "Segoe UI", Arial, sans-serif; color:#e8eef5;
    background:var(--navy); overflow:hidden;
  }
  #deck { height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory; scroll-behavior:smooth; }
  section {
    height:100vh; scroll-snap-align:start; display:flex; flex-direction:column;
    justify-content:center; padding:6vh 8vw; position:relative;
    border-left:10px solid var(--blue);
  }
  h1 { font-size:3rem; margin:0 0 1rem; line-height:1.05; }
  h2 { font-size:2rem; margin:0 0 1.2rem; color:var(--blue); }
  p, li { font-size:1.35rem; line-height:1.5; max-width:64ch; }
  ul { margin:0; padding-left:1.2em; } li { margin:.4rem 0; }
  b, strong { color:var(--blue); }
  code { font-family:"SF Mono", Menlo, Consolas, monospace; font-size:.95em;
         background:rgba(255,255,255,.10); padding:.1em .35em; border-radius:4px; }
  pre { background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.12);
        border-radius:8px; padding:1rem 1.2rem; overflow:auto; max-width:80ch; }
  pre code { background:none; padding:0; font-size:1.05rem; line-height:1.45; color:#dfe9f5; }
  img { max-width:min(80ch, 100%); max-height:52vh; background:#fff; border-radius:8px; }
  a { color:var(--blue); }
  .pager { position:fixed; bottom:14px; right:18px; font-size:.85rem; color:#9fb6d8; }
  .hint  { position:fixed; bottom:14px; left:18px;  font-size:.85rem; color:#6b83a8; }
  .err   { color:#ffb4b4; }
</style>
</head>
<body>
<div id="deck"><section><p>Loading slides…</p></section></div>
<div class="hint">↑ ↓ / Space to move</div>
<div class="pager" id="pager"></div>
<script>
  // --- tiny markdown -> HTML for one slide's body ---------------------------
  function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function inline(s){
    // s is already HTML-escaped. Apply a safe markdown subset.
    return s
      .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>');
  }
  function renderSlide(md){
    var lines = md.replace(/\r/g,"").split("\n");
    var html = "", i = 0, list = null;
    function closeList(){ if(list){ html += "</ul>"; list = null; } }
    while (i < lines.length){
      var ln = lines[i];
      if (/^```/.test(ln)){                 // fenced code block
        closeList();
        var buf = [];
        i++;
        while (i < lines.length && !/^```/.test(lines[i])){ buf.push(lines[i]); i++; }
        i++;                                 // skip closing fence
        html += "<pre><code>" + esc(buf.join("\n")) + "</code></pre>";
        continue;
      }
      if (/^\s*<!--/.test(ln)){ i++; continue; }   // id comment already consumed
      var h = ln.match(/^(#{1,2})\s+(.*)$/);
      if (h){ closeList(); var t = h[1].length===1?"h1":"h2"; html += "<"+t+">"+inline(esc(h[2]))+"</"+t+">"; i++; continue; }
      if (/^\s*-\s+/.test(ln)){
        if (!list){ html += "<ul>"; list = true; }
        html += "<li>" + inline(esc(ln.replace(/^\s*-\s+/,""))) + "</li>";
        i++; continue;
      }
      if (ln.trim()===""){ closeList(); i++; continue; }
      // paragraph: gather until blank / block start
      closeList();
      var para = [ln]; i++;
      while (i<lines.length && lines[i].trim()!=="" && !/^```|^\s*-\s+|^#{1,2}\s/.test(lines[i])){ para.push(lines[i]); i++; }
      html += "<p>" + inline(esc(para.join(" "))) + "</p>";
    }
    closeList();
    return html;
  }
  // --- build the deck from slides.md ----------------------------------------
  var deck = document.getElementById('deck');
  var pager = document.getElementById('pager');
  var slides = [];
  function cur(){ var h = window.innerHeight || 1; var n = Math.round(deck.scrollTop / h); return isFinite(n) ? n : 0; }
  function show(){ if(slides.length) pager.textContent = (cur()+1) + ' / ' + slides.length; }
  function go(n){ var i = Math.max(0, Math.min(slides.length-1, cur()+n)); slides[i].scrollIntoView(); }
  // Accept both #id and Educates' #/id (the /slides/#/<id> link form it routes to
  // the Slides tab).
  function toHash(){ var id = (location.hash || '').replace(/^#\/?/, ''); var el = id && document.getElementById(id); if (el) el.scrollIntoView(); }
  function build(md){
    var chunks = md.replace(/\r/g,"").split(/^\s*---\s*$/m).map(function(c){return c.trim();}).filter(Boolean);
    deck.innerHTML = "";
    chunks.forEach(function(chunk){
      var sec = document.createElement('section');
      var m = chunk.match(/<!--\s*id:\s*([\w-]+)\s*-->/);
      if (m) sec.id = m[1];
      sec.innerHTML = renderSlide(chunk);
      deck.appendChild(sec);
    });
    slides = deck.querySelectorAll('section');
    toHash(); show();
  }
  fetch('slides.md', {cache:'no-store'})
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.text(); })
    .then(build)
    .catch(function(e){ deck.innerHTML = '<section><h2 class="err">Could not load slides.md</h2><p>'+e+'</p></section>'; });
  window.addEventListener('hashchange', toHash);
  deck.addEventListener('scroll', show, {passive:true});
  document.addEventListener('keydown', function(e){
    if (e.key==='ArrowDown'||e.key==='PageDown'||e.key===' '){ e.preventDefault(); go(1); }
    else if (e.key==='ArrowUp'||e.key==='PageUp'){ e.preventDefault(); go(-1); }
  });
</script>
</body>
</html>
