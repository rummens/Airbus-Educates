apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-a00-environment-tour
  # --- DCS portal catalog metadata (this file is emitted verbatim; the portal
  #     reads these academy.dcs/* labels+annotations off metadata, NOT spec) ----
  labels:
    # REQUIRED: which track this lab appears under (must equal a Track's id) and
    # its sort order within that track (string value; low = first). A00 sorts
    # before A01 (order "10") without renumbering the rest.
    academy.dcs/track: core
    academy.dcs/order: "5"
    # This lab creates no Route/Ingress → a plain dev namespace is fine.
    dcs.airbus.com/lifecycle: dev
  annotations:
    # Lets ArgoCD apply this CR before the Educates Workshop CRD is dry-run-checked.
    # Keep this wave well BELOW the TrainingPortal's (100) so the workshop exists first.
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  title: Your Workshop Environment
  description: A quick tour of the DCS Academy lab environment — the split terminals, the code editor, the Kubernetes Dashboard console tab, and the feedback form — so the tools never get in the way of the learning.
  duration: 5m
  difficulty: beginner
  labels:
    - name: module
      value: "A-Foundations"
  publish:
    image: "$(image_repository)/lab-a00-environment-tour-files:$(workshop_version)"
    files:
    - directory:
        path: .
      includePaths:
      - /workshop/**
      - /exercises/**
      - /README.md
  workshop:
    image: "{{ .Values.workshopImages.base }}"
    files:
    {{- if .Values.workshopContent.useGit }}
    - git:
        url: "{{ .Values.workshopContent.gitUrl }}"
        ref: "{{ .Values.workshopContent.gitRef }}"
      includePaths:
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a00-environment-tour/workshop/**"
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a00-environment-tour/exercises/**"
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a00-environment-tour/README.md"
      newRootPath: "{{ trimPrefix "/" .Values.workshopContent.tracksRoot }}/core-track/lab-a00-environment-tour"
    {{- else }}
    - image:
        url: "$(image_repository)/lab-a00-environment-tour-files:$(workshop_version)"
    {{- end }}
  session:
    namespaces:
      security:
        token:
          # Enabled because the Console (Kubernetes Dashboard) tab is enabled below
          # and talks to the cluster API as the session service account.
          enabled: true
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      # The Console tab is the generic Kubernetes Dashboard (a read-only visual view
      # of the session namespace) — NOT the OpenShift web console, which is toured
      # separately in A08 and cannot be embedded here.
      console:
        enabled: true
      examiner:
        enabled: true
      # vcluster decision (house standard: always record it explicitly). This lab
      # runs in a NATIVE OpenShift session namespace — no per-session vcluster. It is
      # a UI orientation tour with no cluster-scoped work.
      vcluster:
        enabled: false
