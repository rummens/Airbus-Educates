apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-a06-networking
  labels:
    academy.dcs/track: core
    academy.dcs/order: "60"
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  title: Networking & Exposing Apps
  description: Expose an application on DCS with the session proxy and an OpenShift Route, understand DCS DNS naming, and see Network Policies and egress restrictions on an air-gapped platform.
  duration: 55m
  difficulty: beginner
  labels:
    - name: module
      value: "A-Foundations"
  publish:
    image: "$(image_repository)/lab-a06-networking-files:$(workshop_version)"
    files:
    - directory:
        path: .
      includePaths:
      - /workshop/**
      - /exercises/**
      - /README.md
  workshop:
    image: "{{ .Values.workshopImages.base }}"
    files:
    {{- if .Values.workshopContent.useGit }}
    - git:
        url: "{{ .Values.workshopContent.gitUrl }}"
        ref: "{{ .Values.workshopContent.gitRef }}"
      includePaths:
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a06-networking/workshop/**"
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a06-networking/exercises/**"
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a06-networking/README.md"
      newRootPath: "{{ trimPrefix "/" .Values.workshopContent.tracksRoot }}/core-track/lab-a06-networking"
    {{- else }}
    - image:
        url: "$(image_repository)/lab-a06-networking-files:$(workshop_version)"
    {{- end }}
  session:
    env:
    - name: DCS_REGISTRY
      value: "harbor.example.dcs/dcs-academy"
    namespaces:
      budget: medium
      security:
        token:
          enabled: true
    # Session-proxy access to the sample app: this ingress creates a proxied,
    # auth-gated HTTPS endpoint at <session>-app.<ingress_domain> for the hello-dcs
    # Service on port 8080. The dashboard tab is created dynamically in the content
    # (page 02) so the URL is visible in context.
    ingresses:
    - name: app
      port: 8080
    # Educates' default session role (educates-admin-session-role) grants most
    # namespace verbs but NOT routes — so grant the session service account the
    # ability to manage Routes, which this workshop's core exercise needs. (On DCS a
    # tenant creates Routes in a PROD-type namespace; this mirrors that access.)
    objects:
    - apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: session-route-manager
        namespace: $(session_namespace)
      rules:
      - apiGroups: ["route.openshift.io"]
        resources: ["routes"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      - apiGroups: ["route.openshift.io"]
        resources: ["routes/custom-host"]
        verbs: ["create"]
      # Read-only on Network Policies so the learner can INSPECT the pre-provisioned
      # one (tenants can't create them yet — observe-only). Educates' default session
      # role excludes networkpolicies entirely, so grant read here.
      - apiGroups: ["networking.k8s.io"]
        resources: ["networkpolicies"]
        verbs: ["get", "list", "watch"]
    - apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: session-route-manager
        namespace: $(session_namespace)
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: Role
        name: session-route-manager
      subjects:
      - kind: ServiceAccount
        name: $(service_account)
        namespace: $(workshop_namespace)
    # A representative Network Policy is pre-provisioned for the learner to INSPECT.
    # Tenants cannot self-create Network Policies on DCS yet (roadmap), so this lab
    # teaches NetworkPolicy as observe/concept. This one is a targeted ALLOW (ingress
    # to hello-dcs on 8080) so it does not break the session proxy or examiner checks.
    - apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-hello-dcs-ingress
        namespace: $(session_namespace)
      spec:
        podSelector:
          matchLabels:
            app: hello-dcs
        policyTypes:
        - Ingress
        ingress:
        - ports:
          - protocol: TCP
            port: 8080
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      console:
        enabled: true
      examiner:
        enabled: true
      # Native OpenShift session namespace — no per-session vcluster needed.
      vcluster:
        enabled: false
