<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" role="img" aria-label="Operator pattern: a Custom Resource states desired state; the operator reconciles it into managed workloads.">
  <style>
    .box { fill: #e8eef7; stroke: #2b6cb0; stroke-width: 2; }
    .op  { fill: #f3e8f7; stroke: #7b3fa0; stroke-width: 2; }
    .lbl { fill: #1a2b45; font: 600 15px sans-serif; }
    .sub { fill: #33445c; font: 12px sans-serif; }
    .arrow { stroke: #2b6cb0; stroke-width: 2; fill: none; marker-end: url(#a); }
    .rec { stroke: #7b3fa0; stroke-width: 2; fill: none; marker-end: url(#b); stroke-dasharray: 5 3; }
    .cap { fill: #33445c; font: italic 12px sans-serif; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#2b6cb0"/>
    </marker>
    <marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#7b3fa0"/>
    </marker>
  </defs>

  <rect class="box" x="30" y="95" width="170" height="70" rx="8"/>
  <text class="lbl" x="115" y="125" text-anchor="middle">Custom Resource</text>
  <text class="sub" x="115" y="147" text-anchor="middle">desired state (you own)</text>

  <rect class="op" x="270" y="95" width="160" height="70" rx="8"/>
  <text class="lbl" x="350" y="125" text-anchor="middle">Operator</text>
  <text class="sub" x="350" y="147" text-anchor="middle">controller (platform owns)</text>

  <rect class="box" x="500" y="95" width="170" height="70" rx="8"/>
  <text class="lbl" x="585" y="125" text-anchor="middle">Managed workloads</text>
  <text class="sub" x="585" y="147" text-anchor="middle">actual state</text>

  <path class="arrow" d="M200 130 L268 130"/>
  <path class="arrow" d="M430 130 L498 130"/>
  <text class="cap" x="234" y="120" text-anchor="middle">watches</text>
  <text class="cap" x="464" y="120" text-anchor="middle">creates</text>

  <!-- reconcile loop: actual state observed back into the operator -->
  <path class="rec" d="M585 165 C585 220, 350 220, 350 168"/>
  <text class="cap" x="468" y="238" text-anchor="middle" fill="#7b3fa0">reconcile: drive actual → desired</text>
</svg>
