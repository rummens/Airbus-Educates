apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-a05-access-tenancy
  labels:
    academy.dcs/track: core
    academy.dcs/order: "50"
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  title: Access & Tenancy
  description: Learn how teams onboard to DCS — the tenant model, RBAC basics, and namespace quotas — and how access is scoped to your tenant's namespaces.
  duration: 35m
  difficulty: beginner
  labels:
    - name: module
      value: "A-Foundations"
  publish:
    image: "$(image_repository)/lab-a05-access-tenancy-files:$(workshop_version)"
    files:
    - directory:
        path: .
      includePaths:
      - /workshop/**
      - /exercises/**
      - /README.md
  workshop:
    image: "$(image_repository)/dcs-workshop-base:$(workshop_version)"
    files:
    - image:
        url: "$(image_repository)/lab-a05-access-tenancy-files:$(workshop_version)"
  session:
    # DCS_REGISTRY is the single terminal/manifest source for the sample-image
    # registry (Plane 3). Keep it in sync with dcs_registry in workshop/config.yaml,
    # which is the content-rendering copy. Placeholder value — re-pointable per deploy.
    env:
    - name: DCS_REGISTRY
      value: "harbor.example.dcs/dcs-academy"
    namespaces:
      budget: medium
      security:
        token:
          enabled: true
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      console:
        enabled: true
      examiner:
        enabled: true
      # Native OpenShift session namespace — no per-session vcluster needed.
      vcluster:
        enabled: false
