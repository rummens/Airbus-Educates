# hello-dcs in UI mode: serves a styled HTML page and prints the app's own
# external URL (from the request Host header) into the page — so once exposed
# via the Route, you see the live DCS Route host.
# Apply with: envsubst < deployment.yaml | oc apply -f -
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-dcs
  labels:
    app: hello-dcs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-dcs
  template:
    metadata:
      labels:
        app: hello-dcs
    spec:
      containers:
      - name: hello-dcs
        image: ${DCS_REGISTRY}/samples/hello-dcs:1.0
        env:
        - name: MODE
          value: "UI"
        ports:
        - containerPort: 8080
        # Health probes on the app's silent /healthz endpoint. readiness gates the
        # Service/Route/session-proxy so traffic only arrives once the app serves
        # (no more router "Application is not available" race); liveness restarts a hung pod.
        readinessProbe:
          httpGet: { path: /healthz, port: 8080 }
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet: { path: /healthz, port: 8080 }
          initialDelaySeconds: 5
          periodSeconds: 15
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 64Mi
