apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-a08-openshift-console
  labels:
    academy.dcs/track: core
    academy.dcs/order: "80"
    dcs.airbus.com/lifecycle: dev
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    # ROUGH DRAFT (2026-07-16): console-tour approach undecided. The session Console
    # tab is the k8s Dashboard (real OpenShift console can't be iframed — see the
    # educates-openshift-console-limitation memory). Real-console views are shown as
    # placeholder screenshots. oc-parity commands are live. Complete enough to review.
spec:
  title: "The OpenShift Console — A Guided Tour"
  description: Everything you did with oc has a UI. Tour the OpenShift web console — Workloads, Networking, Storage, Config — mapped one-to-one to the commands you already know, and learn when the console is the faster tool.
  duration: 25m
  difficulty: beginner
  labels:
    - name: module
      value: "A-Foundations"
  publish:
    image: "$(image_repository)/lab-a08-openshift-console-files:$(workshop_version)"
    files:
    - directory:
        path: .
      includePaths:
      - /workshop/**
      - /exercises/**
      - /README.md
  workshop:
    image: "{{ .Values.workshopImages.base }}"
    files:
    {{- if .Values.workshopContent.useGit }}
    - git:
        url: "{{ .Values.workshopContent.gitUrl }}"
        ref: "{{ .Values.workshopContent.gitRef }}"
      includePaths:
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a08-openshift-console/workshop/**"
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a08-openshift-console/exercises/**"
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a08-openshift-console/README.md"
      newRootPath: "{{ trimPrefix "/" .Values.workshopContent.tracksRoot }}/core-track/lab-a08-openshift-console"
    {{- else }}
    - image:
        url: "$(image_repository)/lab-a08-openshift-console-files:$(workshop_version)"
    {{- end }}
  session:
    env:
    - name: DCS_REGISTRY
      value: "harbor.example.dcs/dcs-academy"
    namespaces:
      budget: medium
      security:
        token:
          enabled: true
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      # The Console tab is the generic Kubernetes Dashboard usable as the session SA
      # (the real OpenShift web console can't be embedded — frame-ancestors DENY, no
      # SSO propagation). Real-console-only views are shown as screenshots.
      console:
        enabled: true
      examiner:
        enabled: true
      vcluster:
        enabled: false
