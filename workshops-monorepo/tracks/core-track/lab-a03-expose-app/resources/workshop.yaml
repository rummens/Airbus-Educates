apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-a03-expose-app
  labels:
    academy.dcs/track: core
    academy.dcs/order: "30"
    # This lab creates a Route (external exposure) → it is the one Core lab that needs a
    # PROD-type namespace. This label marks that intent on the Workshop CR. NOTE: the
    # Kyverno policy that would copy this onto the session namespace is disabled on
    # OpenShift (kyverno is off — see dcs-academy-platform values), so the label is NOT
    # yet propagated at runtime. If PROD-scoped policy enforcement is turned on later,
    # a non-Kyverno propagation path is needed (see portal chart workshopEnvLabel).
    dcs.airbus.com/lifecycle: prod
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  title: "Expose Your App"
  description: Give your app a stable in-cluster address with a Service, then expose it for real with a Route on DCS-managed DNS — reachable outside the session — and surface it as a new dashboard tab inside the session too.
  duration: 20m
  difficulty: beginner
  labels:
    - name: module
      value: "A-Foundations"
  publish:
    image: "$(image_repository)/lab-a03-expose-app-files:$(workshop_version)"
    files:
    - directory:
        path: .
      includePaths:
      - /workshop/**
      - /exercises/**
      - /README.md
  workshop:
    image: "{{ .Values.workshopImages.base }}"
    files:
    {{- if .Values.workshopContent.useGit }}
    - git:
        url: "{{ .Values.workshopContent.gitUrl }}"
        ref: "{{ .Values.workshopContent.gitRef }}"
      includePaths:
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a03-expose-app/workshop/**"
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a03-expose-app/exercises/**"
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a03-expose-app/README.md"
      newRootPath: "{{ trimPrefix "/" .Values.workshopContent.tracksRoot }}/core-track/lab-a03-expose-app"
    {{- else }}
    - image:
        url: "$(image_repository)/lab-a03-expose-app-files:$(workshop_version)"
    {{- end }}
  session:
    env:
    - name: DCS_REGISTRY
      value: "harbor.example.dcs/dcs-academy"
    namespaces:
      budget: medium
      security:
        token:
          enabled: true
    # Session-proxy access to the sample app: this ingress creates a proxied,
    # auth-gated HTTPS endpoint at app-$(session_hostname) for the hello-dcs Service
    # on 8080. The dashboard tab is created dynamically in the content (page 04) so
    # the URL is visible in context.
    # `host` MUST point at the hello-dcs Service in the session namespace — without it
    # the proxy targets the workshop pod itself (nothing on 8080) and the tab shows
    # OpenShift's "Application is not available" page.
    ingresses:
    - name: app
      protocol: http
      host: hello-dcs.$(session_namespace).svc.cluster.local
      port: 8080
    # Educates' default session role grants most namespace verbs but NOT routes or
    # networkpolicies. Grant the session service account route management (the core
    # exercise) + read-only networkpolicies (observe-only, page 05).
    objects:
    - apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: session-route-manager
        namespace: $(session_namespace)
      rules:
      - apiGroups: ["route.openshift.io"]
        resources: ["routes"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      - apiGroups: ["route.openshift.io"]
        resources: ["routes/custom-host"]
        verbs: ["create"]
      - apiGroups: ["networking.k8s.io"]
        resources: ["networkpolicies"]
        verbs: ["get", "list", "watch"]
    - apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: session-route-manager
        namespace: $(session_namespace)
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: Role
        name: session-route-manager
      subjects:
      - kind: ServiceAccount
        name: $(service_account)
        namespace: $(workshop_namespace)
    # A representative Network Policy is pre-provisioned for the learner to INSPECT.
    # Tenants cannot self-create Network Policies on DCS yet (roadmap), so this lab
    # teaches NetworkPolicy as observe/concept. This one is a targeted ALLOW (ingress
    # to hello-dcs on 8080) so it does not break the session proxy or examiner checks.
    - apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-hello-dcs-ingress
        namespace: $(session_namespace)
      spec:
        podSelector:
          matchLabels:
            app: hello-dcs
        policyTypes:
        - Ingress
        ingress:
        - ports:
          - protocol: TCP
            port: 8080
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      examiner:
        enabled: true
      # Service in the (PROD-type) session namespace; Route admitted there too. No
      # per-session throwaway cluster needed.
      vcluster:
        enabled: false
