apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-a03-namespace-model
  labels:
    academy.dcs/track: core
    academy.dcs/order: "30"
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  title: Namespaces & the Prod/Dev Model
  description: Understand the DCS dev and prod namespace types, see them side by side in a virtual cluster, and learn how workloads move from dev to prod.
  duration: 40m
  difficulty: beginner
  labels:
    module: "A-Foundations"
  publish:
    image: "$(image_repository)/lab-a03-namespace-model-files:$(workshop_version)"
    files:
    - directory:
        path: .
      includePaths:
      - /workshop/**
      - /exercises/**
      - /README.md
  workshop:
    image: "$(image_repository)/dcs-workshop-base:$(workshop_version)"
    files:
    - image:
        url: "$(image_repository)/lab-a03-namespace-model-files:$(workshop_version)"
  session:
    # DCS_REGISTRY is the single terminal/manifest source for the sample-image
    # registry (Plane 3). Keep it in sync with dcs_registry in workshop/config.yaml.
    env:
    - name: DCS_REGISTRY
      value: "harbor.example.dcs/dcs-academy"
    namespaces:
      # vcluster needs the 'large' budget (it always runs CoreDNS + control plane).
      budget: large
      security:
        policy: restricted
        token:
          enabled: true
    # vcluster on OpenShift needs the -vc namespace granted the privileged SCC
    # (Educates hardcodes it to baseline; CoreDNS needs NET_BIND_SERVICE, else it
    # crashloops). Keep this block whenever vcluster.enabled is true.
    objects:
    - apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: educates-vcluster-scc
        namespace: $(vcluster_namespace)
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: educates-privileged-scc
      subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: Group
        name: system:serviceaccounts:$(vcluster_namespace)
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      console:
        enabled: true
      examiner:
        enabled: true
      vcluster:
        # Gives the learner a per-session cluster with cluster-admin, so they can
        # create real DEV/PROD namespaces and apply a Kyverno policy — the only
        # Foundations lab that needs this.
        enabled: true
