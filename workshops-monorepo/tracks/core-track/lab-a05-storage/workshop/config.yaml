# Educates workshop config. `params` is a LIST of {name, value} entries
# (NOT a Hugo-style map) — each is rendered in content via {{< param name >}}.
# The param trio is mandatory; values are placeholders, re-pointable without a rebuild.
params:
- name: product_name
  value: "Digital Container Service (DCS)"
- name: product_short
  value: "DCS"
- name: dcs_registry
  value: "harbor.example.dcs/dcs-academy"
- name: dcs_docs_base_url
  value: "https://docs.example.dcs"
# Storage-class names are placeholders until confirmed with the DCS storage team.
- name: dcs_sc_file
  value: "dcs-file-rwx"
- name: dcs_sc_block
  value: "dcs-block-rwo"
