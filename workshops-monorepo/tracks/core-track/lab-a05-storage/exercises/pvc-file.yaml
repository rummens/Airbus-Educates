apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hello-dcs-data
spec:
  # File storage is ReadWriteMany — shareable across pods/nodes.
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  # No storageClassName here → the cluster's default class provisions the volume,
  # so this binds on any cluster. On DCS you PIN the class to control File vs Block
  # and satisfy data-classification, e.g.:
  #   storageClassName: {{DCS_SC_FILE}}
