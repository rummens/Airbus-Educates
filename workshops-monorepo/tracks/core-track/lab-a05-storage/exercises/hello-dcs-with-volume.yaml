# hello-dcs with the File PVC mounted at /opt/app-root/src/data. Data written there lives
# on the PersistentVolume, not the container filesystem — so it survives pod restarts.
# The mount path sits inside the image's own writable app home (/opt/app-root/src): this
# image runs non-root (UID 1001), and a non-root process can only write where it owns the
# path. Mounting a volume at a root-level path like /data leaves it root-owned and the app
# gets "Permission denied" on write. Keep app data under the app's home directory.
# Apply with: envsubst < hello-dcs-with-volume.yaml | oc apply -f -
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-dcs
  labels:
    app: hello-dcs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-dcs
  template:
    metadata:
      labels:
        app: hello-dcs
    spec:
      containers:
      - name: hello-dcs
        image: ${DCS_REGISTRY}/samples/hello-dcs:1.0
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: data
          mountPath: /opt/app-root/src/data
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 64Mi
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: hello-dcs-data
