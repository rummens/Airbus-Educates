apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-a02-kubernetes-essentials
  labels:
    academy.dcs/track: core
    academy.dcs/order: "20"
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  title: Kubernetes Essentials on DCS
  description: Deploy your first workload on DCS with oc — Pods, Deployments, and Services — and learn to inspect and scale it.
  duration: 40m
  difficulty: beginner
  labels:
    - name: module
      value: "A-Foundations"
  publish:
    image: "$(image_repository)/lab-a02-kubernetes-essentials-files:$(workshop_version)"
    files:
    - directory:
        path: .
      includePaths:
      - /workshop/**
      - /exercises/**
      - /README.md
  workshop:
    image: "{{ .Values.workshopImages.base }}"
    files:
    {{- if .Values.workshopContent.useGit }}
    - git:
        url: "{{ .Values.workshopContent.gitUrl }}"
        ref: "{{ .Values.workshopContent.gitRef }}"
      includePaths:
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a02-kubernetes-essentials/workshop/**"
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a02-kubernetes-essentials/exercises/**"
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a02-kubernetes-essentials/README.md"
      newRootPath: "{{ trimPrefix "/" .Values.workshopContent.tracksRoot }}/core-track/lab-a02-kubernetes-essentials"
    {{- else }}
    - image:
        url: "$(image_repository)/lab-a02-kubernetes-essentials-files:$(workshop_version)"
    {{- end }}
  session:
    # DCS_REGISTRY is the single terminal/manifest source for the sample-image
    # registry (Plane 3). Keep it in sync with dcs_registry in workshop/config.yaml,
    # which is the content-rendering copy. Placeholder value — re-pointable per deploy.
    env:
    - name: DCS_REGISTRY
      value: "harbor.example.dcs/dcs-academy"
    namespaces:
      budget: medium
      security:
        token:
          enabled: true
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      console:
        enabled: true
      examiner:
        enabled: true
      # Native OpenShift session namespace — no per-session vcluster needed.
      vcluster:
        enabled: false
