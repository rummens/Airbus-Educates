<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" font-family="sans-serif">
  <rect x="0" y="0" width="720" height="260" fill="#f5f7fa" stroke="#c5ced6"/>
  <text x="360" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2b3a">You create one Deployment — it creates the rest</text>

  <!-- Deployment -->
  <rect x="40" y="60" width="150" height="70" rx="6" fill="#e8f0f7" stroke="#3b7dd8"/>
  <text x="115" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b4a86">Deployment</text>
  <text x="115" y="108" text-anchor="middle" font-size="10" fill="#5a6b7b">desired state,</text>
  <text x="115" y="122" text-anchor="middle" font-size="10" fill="#5a6b7b">rollouts</text>

  <!-- arrow -->
  <line x1="190" y1="95" x2="270" y2="95" stroke="#5a6b7b" stroke-width="2" marker-end="url(#a)"/>
  <text x="230" y="86" text-anchor="middle" font-size="9" fill="#5a6b7b">creates</text>

  <!-- ReplicaSet -->
  <rect x="270" y="60" width="150" height="70" rx="6" fill="#eef3ee" stroke="#4a9a5a"/>
  <text x="345" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c6a3a">ReplicaSet</text>
  <text x="345" y="108" text-anchor="middle" font-size="10" fill="#5a6b7b">keeps N pods</text>
  <text x="345" y="122" text-anchor="middle" font-size="10" fill="#5a6b7b">running</text>

  <!-- arrow -->
  <line x1="420" y1="95" x2="500" y2="95" stroke="#5a6b7b" stroke-width="2" marker-end="url(#a)"/>
  <text x="460" y="86" text-anchor="middle" font-size="9" fill="#5a6b7b">creates</text>

  <!-- Pods -->
  <rect x="500" y="52" width="180" height="26" rx="4" fill="#fbeee8" stroke="#c8702a"/>
  <text x="590" y="70" text-anchor="middle" font-size="11" fill="#8a4a12">Pod (your app instance)</text>
  <rect x="500" y="82" width="180" height="26" rx="4" fill="#fbeee8" stroke="#c8702a"/>
  <text x="590" y="100" text-anchor="middle" font-size="11" fill="#8a4a12">Pod</text>
  <rect x="500" y="112" width="180" height="26" rx="4" fill="#fbeee8" stroke="#c8702a"/>
  <text x="590" y="130" text-anchor="middle" font-size="11" fill="#8a4a12">Pod</text>

  <text x="360" y="185" text-anchor="middle" font-size="11" fill="#1b2b3a">Change flows DOWN: edit the Deployment, never a ReplicaSet or Pod.</text>
  <text x="360" y="205" text-anchor="middle" font-size="11" fill="#1b2b3a">Delete the Deployment and the ReplicaSet + Pods are removed with it.</text>
  <text x="360" y="230" text-anchor="middle" font-size="10" fill="#5a6b7b">(Like a VM scale-set: you manage the group, not each VM by hand.)</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a6b7b"/>
    </marker>
  </defs>
</svg>
