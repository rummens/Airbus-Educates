apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-a02-configure-troubleshoot
  labels:
    academy.dcs/track: core
    academy.dcs/order: "20"
    # No Route/Ingress here (still local reach only) → dev namespace.
    dcs.airbus.com/lifecycle: dev
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  title: "Configure & Troubleshoot Your App"
  description: Move your app's configuration into a ConfigMap and a Secret, roll out the change — then, when it breaks, diagnose the fault from logs, events and describe, fix it, and confirm recovery.
  duration: 20m
  difficulty: beginner
  labels:
    - name: module
      value: "A-Foundations"
  publish:
    image: "$(image_repository)/lab-a02-configure-troubleshoot-files:$(workshop_version)"
    files:
    - directory:
        path: .
      includePaths:
      - /workshop/**
      - /exercises/**
      - /README.md
  workshop:
    image: "{{ .Values.workshopImages.base }}"
    files:
    {{- if .Values.workshopContent.useGit }}
    - git:
        url: "{{ .Values.workshopContent.gitUrl }}"
        ref: "{{ .Values.workshopContent.gitRef }}"
      includePaths:
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a02-configure-troubleshoot/workshop/**"
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a02-configure-troubleshoot/exercises/**"
      - "{{ .Values.workshopContent.tracksRoot }}/core-track/lab-a02-configure-troubleshoot/README.md"
      newRootPath: "{{ trimPrefix "/" .Values.workshopContent.tracksRoot }}/core-track/lab-a02-configure-troubleshoot"
    {{- else }}
    - image:
        url: "$(image_repository)/lab-a02-configure-troubleshoot-files:$(workshop_version)"
    {{- end }}
  session:
    env:
    - name: DCS_REGISTRY
      value: "harbor.example.dcs/dcs-academy"
    namespaces:
      budget: medium
      security:
        policy: restricted
        token:
          enabled: true
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      examiner:
        enabled: true
      # Continues A02's app in the plain session namespace; nothing cluster-scoped.
      vcluster:
        enabled: false
