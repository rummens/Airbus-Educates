apiVersion: v1
kind: Secret
metadata:
  name: hello-dcs-secret
type: Opaque
# stringData lets us write the value in plain text for readability in this lab.
# NOTE: real credentials are NEVER committed to git — production Secrets are
# created out-of-band (sealed secrets, a vault, or `oc create secret`).
stringData:
  API_TOKEN: "demo-not-a-real-token"
