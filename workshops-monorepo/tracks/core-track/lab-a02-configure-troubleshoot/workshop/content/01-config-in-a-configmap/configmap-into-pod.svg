<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" font-family="sans-serif">
  <rect x="0" y="0" width="780" height="320" fill="#f5f7fa" stroke="#c5ced6"/>
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1b2b3a">One ConfigMap feeds the Pod two ways</text>

  <!-- ConfigMap -->
  <rect x="40" y="115" width="180" height="110" rx="6" fill="#e8f0f7" stroke="#3b7dd8"/>
  <text x="130" y="143" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b4a86">ConfigMap</text>
  <text x="130" y="145" text-anchor="middle" font-size="10" fill="#5a6b7b"></text>
  <text x="130" y="168" text-anchor="middle" font-size="11" fill="#5a6b7b">GREETING: ...</text>
  <text x="130" y="185" text-anchor="middle" font-size="11" fill="#5a6b7b">MODE: ...</text>
  <text x="130" y="210" text-anchor="middle" font-size="9" fill="#8a97a4">key/value pairs, outside the image</text>

  <!-- Pod -->
  <rect x="500" y="60" width="240" height="90" rx="6" fill="#ffffff" stroke="#8aa0b4"/>
  <text x="620" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2b3a">Environment variables</text>
  <text x="620" y="110" text-anchor="middle" font-size="11" fill="#5a6b7b">GREETING=...  MODE=...</text>
  <text x="620" y="130" text-anchor="middle" font-size="9" fill="#8a97a4">the app reads them at start</text>

  <rect x="500" y="190" width="240" height="90" rx="6" fill="#ffffff" stroke="#8aa0b4"/>
  <text x="620" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2b3a">Files on disk</text>
  <text x="620" y="240" text-anchor="middle" font-size="11" fill="#5a6b7b">/etc/hello-dcs/GREETING</text>
  <text x="620" y="260" text-anchor="middle" font-size="9" fill="#8a97a4">one file per key, mounted in</text>

  <!-- arrows -->
  <g stroke="#5a6b7b" stroke-width="2" fill="#5a6b7b">
    <line x1="220" y1="150" x2="498" y2="105"/><polygon points="498,105 489,104 492,113"/>
    <line x1="220" y1="190" x2="498" y2="235"/><polygon points="498,235 492,227 489,236"/>
  </g>
  <text x="360" y="118" text-anchor="middle" font-size="10" fill="#2c6a3a">envFrom</text>
  <text x="360" y="228" text-anchor="middle" font-size="10" fill="#2c6a3a">volume mount</text>

  <text x="390" y="305" text-anchor="middle" font-size="11" fill="#5a6b7b">Same values, delivered as env vars and as files — you choose which the app uses.</text>
</svg>
