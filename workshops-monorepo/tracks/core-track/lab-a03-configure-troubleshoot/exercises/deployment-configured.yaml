# The A02 app, now declarative and wired to the ConfigMap:
#   - envFrom: every key in the ConfigMap becomes an environment variable.
#   - a volume: the ConfigMap also mounted as files under /etc/hello-dcs.
# The Secret is added later (page 02) with `oc set env --from=secret`, AFTER the
# Secret exists — a workload can't start while it references a missing Secret.
# Apply with: envsubst < deployment-configured.yaml | oc apply -f -
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-dcs
  labels:
    app: hello-dcs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-dcs
  template:
    metadata:
      labels:
        app: hello-dcs
    spec:
      containers:
      - name: hello-dcs
        image: ${DCS_REGISTRY}/samples/hello-dcs:1.0
        envFrom:
        - configMapRef:
            name: hello-dcs-config
        ports:
        - containerPort: 8080
        # Health probes on the app's silent /healthz endpoint (readiness gates routing
        # until the app serves; liveness restarts a hung pod). /healthz is not logged, so
        # it doesn't clutter the `oc logs` diagnosis lesson.
        readinessProbe:
          httpGet: { path: /healthz, port: 8080 }
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet: { path: /healthz, port: 8080 }
          initialDelaySeconds: 5
          periodSeconds: 15
        volumeMounts:
        - name: config
          mountPath: /etc/hello-dcs
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 64Mi
      volumes:
      - name: config
        configMap:
          name: hello-dcs-config
