<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" font-family="sans-serif">
  <rect x="0" y="0" width="820" height="300" fill="#f5f7fa" stroke="#c5ced6"/>
  <text x="410" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1b2b3a">Subject → Binding → Role → Rules</text>

  <!-- Subject -->
  <rect x="24" y="90" width="150" height="70" rx="6" fill="#ffffff" stroke="#8aa0b4"/>
  <text x="99" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2b3a">Subject</text>
  <text x="99" y="134" text-anchor="middle" font-size="10" fill="#5a6b7b">User / Group /</text>
  <text x="99" y="147" text-anchor="middle" font-size="10" fill="#5a6b7b">ServiceAccount</text>

  <!-- Binding -->
  <rect x="212" y="80" width="170" height="90" rx="6" fill="#e8f0f7" stroke="#3b7dd8"/>
  <text x="297" y="106" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b4a86">RoleBinding</text>
  <text x="297" y="123" text-anchor="middle" font-size="10" fill="#5a6b7b">(ClusterRoleBinding</text>
  <text x="297" y="136" text-anchor="middle" font-size="10" fill="#5a6b7b">for cluster scope)</text>
  <text x="297" y="155" text-anchor="middle" font-size="10" fill="#5a6b7b">namespaced</text>

  <!-- Role -->
  <rect x="418" y="80" width="170" height="90" rx="6" fill="#e8f0f7" stroke="#3b7dd8"/>
  <text x="503" y="106" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b4a86">Role</text>
  <text x="503" y="123" text-anchor="middle" font-size="10" fill="#5a6b7b">(ClusterRole for</text>
  <text x="503" y="136" text-anchor="middle" font-size="10" fill="#5a6b7b">cluster scope)</text>
  <text x="503" y="155" text-anchor="middle" font-size="10" fill="#5a6b7b">namespaced</text>

  <!-- Rules -->
  <rect x="624" y="70" width="172" height="110" rx="6" fill="#eef3ee" stroke="#4a9a5a"/>
  <text x="710" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c6a3a">Rules</text>
  <text x="710" y="114" text-anchor="middle" font-size="10" fill="#2c6a3a">apiGroups</text>
  <text x="710" y="130" text-anchor="middle" font-size="10" fill="#2c6a3a">× resources</text>
  <text x="710" y="146" text-anchor="middle" font-size="10" fill="#2c6a3a">× verbs</text>
  <text x="710" y="164" text-anchor="middle" font-size="9" fill="#5a6b7b">get, list, watch…</text>

  <!-- arrows -->
  <g stroke="#5a6b7b" stroke-width="2" fill="#5a6b7b">
    <line x1="174" y1="122" x2="210" y2="122"/><polygon points="210,122 202,118 202,126"/>
    <line x1="382" y1="122" x2="416" y2="122"/><polygon points="416,122 408,118 408,126"/>
    <line x1="588" y1="122" x2="622" y2="122"/><polygon points="622,122 614,118 614,126"/>
  </g>

  <text x="410" y="220" text-anchor="middle" font-size="11" fill="#5a6b7b">A binding grants a subject the permissions defined by one role — the role and binding</text>
  <text x="410" y="238" text-anchor="middle" font-size="11" fill="#5a6b7b">match scope: Role+RoleBinding stay inside one namespace; ClusterRole+ClusterRoleBinding are cluster-wide.</text>
  <text x="410" y="264" text-anchor="middle" font-size="11" fill="#5a6b7b">A ClusterRole can still be bound namespace-locally by a RoleBinding — the built-in "view" role works this way.</text>
</svg>
