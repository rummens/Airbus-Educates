apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-b05-rbac-tenancy
  labels:
    academy.dcs/track: dev
    academy.dcs/order: "50"
    # No Route/Ingress created here — plain in-namespace RBAC work → dev namespace.
    dcs.airbus.com/lifecycle: dev
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  title: "RBAC, Tenancy & Namespaces"
  description: Go past the terms from Core — see the mechanism. The Tenant → Namespaces model in depth, the RBAC objects behind "can I?", tracing subject → binding → role → rule, and proving least privilege by creating a Role + RoleBinding of your own.
  duration: 25m
  difficulty: intermediate
  labels:
    - name: module
      value: "B-Developer"
  publish:
    image: "$(image_repository)/lab-b05-rbac-tenancy-files:$(workshop_version)"
    files:
    - directory:
        path: .
      includePaths:
      - /workshop/**
      - /exercises/**
      - /README.md
  workshop:
    image: "{{ .Values.workshopImages.base }}"
    files:
    {{- if .Values.workshopContent.useGit }}
    - git:
        url: "{{ .Values.workshopContent.gitUrl }}"
        ref: "{{ .Values.workshopContent.gitRef }}"
      includePaths:
      - "{{ .Values.workshopContent.tracksRoot }}/dev-track/lab-b05-rbac-tenancy/workshop/**"
      - "{{ .Values.workshopContent.tracksRoot }}/dev-track/lab-b05-rbac-tenancy/exercises/**"
      - "{{ .Values.workshopContent.tracksRoot }}/dev-track/lab-b05-rbac-tenancy/README.md"
      newRootPath: "{{ trimPrefix "/" .Values.workshopContent.tracksRoot }}/dev-track/lab-b05-rbac-tenancy"
    {{- else }}
    - image:
        url: "$(image_repository)/lab-b05-rbac-tenancy-files:$(workshop_version)"
    {{- end }}
  session:
    namespaces:
      budget: small
      security:
        policy: restricted
        token:
          enabled: true
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      # Learners view the Role/RoleBinding they create and the namespace quota visually.
      console:
        enabled: true
      examiner:
        enabled: true
      # All RBAC work (subject, Role, RoleBinding, --as impersonation) stays inside
      # the learner's own session namespace — no cluster-scoped rights are needed,
      # and ClusterRoles/ClusterRoleBindings are read-only observe on DCS anyway.
      vcluster:
        enabled: false
