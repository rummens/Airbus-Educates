<svg viewBox="0 0 820 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6b7a"/>
    </marker>
  </defs>

  <!-- Row 1: the three catalogs -->
  <rect x="20" y="20" width="230" height="70" rx="8" fill="#e7f0fa" stroke="#3a6ea5" stroke-width="1.5"/>
  <text x="135" y="48" text-anchor="middle" font-size="15" font-weight="600" fill="#1b3a5c">DCS Catalogs</text>
  <text x="135" y="68" text-anchor="middle" font-size="11.5" fill="#3a4a5a">Curated, platform-provided</text>

  <rect x="295" y="20" width="230" height="70" rx="8" fill="#e7f0fa" stroke="#3a6ea5" stroke-width="1.5"/>
  <text x="410" y="42" text-anchor="middle" font-size="15" font-weight="600" fill="#1b3a5c">Allowed External</text>
  <text x="410" y="60" text-anchor="middle" font-size="15" font-weight="600" fill="#1b3a5c">Registries</text>
  <text x="410" y="78" text-anchor="middle" font-size="11.5" fill="#3a4a5a">A permitted set of upstreams</text>

  <rect x="570" y="20" width="230" height="70" rx="8" fill="#fdf1e0" stroke="#b5761f" stroke-width="1.5"/>
  <text x="685" y="42" text-anchor="middle" font-size="15" font-weight="600" fill="#6b3f0a">Proxy-Cached Catalog</text>
  <text x="685" y="60" text-anchor="middle" font-size="11.5" fill="#5a3d0f">Caching proxy for permitted</text>
  <text x="685" y="75" text-anchor="middle" font-size="11.5" fill="#5a3d0f">upstreams — not from PROD</text>

  <!-- arrows down into Harbor -->
  <line x1="135" y1="90" x2="300" y2="150" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="90" x2="410" y2="150" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="685" y1="90" x2="520" y2="150" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Harbor box -->
  <rect x="220" y="160" width="380" height="90" rx="10" fill="#eaf6ee" stroke="#2f8f4e" stroke-width="2"/>
  <text x="410" y="192" text-anchor="middle" font-size="18" font-weight="700" fill="#155724">Harbor Registry</text>
  <text x="410" y="214" text-anchor="middle" font-size="12.5" fill="#1f4a2a">The single trusted source of images —</text>
  <text x="410" y="231" text-anchor="middle" font-size="12.5" fill="#1f4a2a">also stores Helm charts, and scans every artifact</text>

  <!-- arrow down to project -->
  <line x1="410" y1="250" x2="410" y2="300" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Project box -->
  <rect x="300" y="310" width="220" height="60" rx="8" fill="#f4f0fb" stroke="#6a4c9c" stroke-width="1.5"/>
  <text x="410" y="335" text-anchor="middle" font-size="14" font-weight="600" fill="#3d2a63">Project: samples</text>
  <text x="410" y="354" text-anchor="middle" font-size="11.5" fill="#4a3a6a">Images + Helm charts, scoped access</text>

  <!-- arrows down to robot accounts -->
  <line x1="370" y1="370" x2="290" y2="410" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="370" x2="530" y2="410" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Robot account boxes -->
  <rect x="150" y="410" width="200" height="55" rx="8" fill="#fdeceb" stroke="#b23b3b" stroke-width="1.5"/>
  <text x="250" y="433" text-anchor="middle" font-size="13.5" font-weight="600" fill="#6b1f1f">Robot account</text>
  <text x="250" y="452" text-anchor="middle" font-size="12" fill="#6b1f1f">pull-only (this workshop)</text>

  <rect x="470" y="410" width="200" height="55" rx="8" fill="#fdeceb" stroke="#b23b3b" stroke-width="1.5"/>
  <text x="570" y="433" text-anchor="middle" font-size="13.5" font-weight="600" fill="#6b1f1f">Robot account</text>
  <text x="570" y="452" text-anchor="middle" font-size="12" fill="#6b1f1f">push-capable (B02's build)</text>
</svg>
