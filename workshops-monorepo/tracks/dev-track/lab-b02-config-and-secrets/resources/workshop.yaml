apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-b02-config-and-secrets
  labels:
    academy.dcs/track: dev
    academy.dcs/order: "20"
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  title: Configuration & Secrets
  description: Externalise the sample app's config into a ConfigMap, inject a credential with a Secret, and roll out a config change without rebuilding the image.
  duration: 35m
  difficulty: intermediate
  labels:
    - name: module
      value: "B-Developer"
  publish:
    image: "$(image_repository)/lab-b02-config-and-secrets-files:$(workshop_version)"
    files:
    - directory:
        path: .
      includePaths:
      - /workshop/**
      - /exercises/**
      - /README.md
  workshop:
    image: "{{ .Values.workshopImages.base }}"
    files:
    {{- if .Values.workshopContent.useGit }}
    - git:
        url: "{{ .Values.workshopContent.gitUrl }}"
        ref: "{{ .Values.workshopContent.gitRef }}"
      includePaths:
      - "{{ .Values.workshopContent.tracksRoot }}/dev-track/lab-b02-config-and-secrets/workshop/**"
      - "{{ .Values.workshopContent.tracksRoot }}/dev-track/lab-b02-config-and-secrets/exercises/**"
      - "{{ .Values.workshopContent.tracksRoot }}/dev-track/lab-b02-config-and-secrets/README.md"
      newRootPath: "{{ .Values.workshopContent.tracksRoot }}/dev-track/lab-b02-config-and-secrets"
    {{- else }}
    - image:
        url: "$(image_repository)/lab-b02-config-and-secrets-files:$(workshop_version)"
    {{- end }}
  session:
    # DCS_REGISTRY is the single terminal/manifest source for the sample-image registry.
    # Keep it in sync with dcs_registry in workshop/config.yaml (content-rendering copy).
    env:
    - name: DCS_REGISTRY
      value: "harbor.example.dcs/dcs-academy"
    namespaces:
      budget: medium
      security:
        token:
          enabled: true
    # Start where B01 left off: hello-dcs already running, config still baked in (the
    # problem this workshop solves). Garbage-collected with the session.
    objects:
    - apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hello-dcs
        labels:
          app: hello-dcs
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: hello-dcs
        template:
          metadata:
            labels:
              app: hello-dcs
          spec:
            containers:
            - name: hello-dcs
              image: harbor.example.dcs/dcs-academy/samples/hello-dcs:1.0
              ports:
              - containerPort: 8080
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
    - apiVersion: v1
      kind: Service
      metadata:
        name: hello-dcs
        labels:
          app: hello-dcs
      spec:
        selector:
          app: hello-dcs
        ports:
        - port: 8080
          targetPort: 8080
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      console:
        enabled: true
      examiner:
        enabled: true
      # Native OpenShift session namespace — no per-session vcluster needed.
      vcluster:
        enabled: false
