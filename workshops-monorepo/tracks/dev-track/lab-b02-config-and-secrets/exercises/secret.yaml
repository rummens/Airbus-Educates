apiVersion: v1
kind: Secret
metadata:
  name: hello-dcs-secret
  labels:
    app: hello-dcs
type: Opaque
# stringData lets you write the value in plain text for readability HERE. Kubernetes stores
# it base64-encoded — which is NOT encryption, just encoding. In real life a Secret is created
# out-of-band (never committed to git); this file is for the workshop only.
stringData:
  API_TOKEN: "s3cr3t-demo-token-do-not-commit"
