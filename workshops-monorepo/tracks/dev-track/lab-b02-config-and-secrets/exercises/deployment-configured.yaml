apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-dcs
  labels:
    app: hello-dcs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-dcs
  template:
    metadata:
      labels:
        app: hello-dcs
    spec:
      containers:
      - name: hello-dcs
        image: ${DCS_REGISTRY}/samples/hello-dcs:1.0
        ports:
        - containerPort: 8080
        # Deliver all ConfigMap keys as environment variables.
        envFrom:
        - configMapRef:
            name: hello-dcs-config
        # Deliver one Secret key as a single env var (kept out of the image + manifest).
        env:
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: hello-dcs-secret
              key: API_TOKEN
        # Deliver the config file by mounting the ConfigMap as a volume.
        volumeMounts:
        - name: config
          mountPath: /etc/hello-dcs
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: config
        configMap:
          name: hello-dcs-config
