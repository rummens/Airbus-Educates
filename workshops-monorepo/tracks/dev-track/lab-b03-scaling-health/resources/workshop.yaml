apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-b03-scaling-health
  labels:
    academy.dcs/track: dev
    academy.dcs/order: "30"
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  title: Scaling, Health & Resources
  description: Make the sample app resilient and quota-friendly — scale it, add liveness/readiness probes, and set requests/limits that fit your DEV namespace budget.
  duration: 40m
  difficulty: intermediate
  labels:
    - name: module
      value: "B-Developer"
  publish:
    image: "$(image_repository)/lab-b03-scaling-health-files:$(workshop_version)"
    files:
    - directory:
        path: .
      includePaths:
      - /workshop/**
      - /exercises/**
      - /README.md
  workshop:
    image: "{{ .Values.workshopImages.base }}"
    files:
    {{- if .Values.workshopContent.useGit }}
    - git:
        url: "{{ .Values.workshopContent.gitUrl }}"
        ref: "{{ .Values.workshopContent.gitRef }}"
      includePaths:
      - "{{ .Values.workshopContent.tracksRoot }}/dev-track/lab-b03-scaling-health/workshop/**"
      - "{{ .Values.workshopContent.tracksRoot }}/dev-track/lab-b03-scaling-health/exercises/**"
      - "{{ .Values.workshopContent.tracksRoot }}/dev-track/lab-b03-scaling-health/README.md"
      newRootPath: "{{ .Values.workshopContent.tracksRoot }}/dev-track/lab-b03-scaling-health"
    {{- else }}
    - image:
        url: "$(image_repository)/lab-b03-scaling-health-files:$(workshop_version)"
    {{- end }}
  session:
    # DCS_REGISTRY is the single terminal/manifest source for the sample-image
    # registry (Plane 3). Keep it in sync with dcs_registry in workshop/config.yaml,
    # which is the content-rendering copy. Placeholder value — re-pointable per deploy.
    env:
    - name: DCS_REGISTRY
      value: "harbor.example.dcs/dcs-academy"
    namespaces:
      # medium = 2000m CPU / 2Gi memory quota. Deliberately sized so an oversized
      # request (deployment-oversized.yaml) is rejected by the quota, then the
      # learner right-sizes to fit. See workshop/content/02 + 03.
      budget: medium
      security:
        token:
          enabled: true
    # Start with the hello-dcs app already running (single replica, no health
    # probes yet — the learner adds those). Mirrors where B01/B02 left off.
    # Garbage-collected with the session. Image matches DCS_REGISTRY above.
    objects:
    - apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hello-dcs
        labels:
          app: hello-dcs
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: hello-dcs
        template:
          metadata:
            labels:
              app: hello-dcs
          spec:
            containers:
            - name: hello-dcs
              image: harbor.example.dcs/dcs-academy/samples/hello-dcs:1.0
              ports:
              - containerPort: 8080
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
    - apiVersion: v1
      kind: Service
      metadata:
        name: hello-dcs
        labels:
          app: hello-dcs
      spec:
        selector:
          app: hello-dcs
        ports:
        - port: 8080
          targetPort: 8080
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      console:
        enabled: true
      examiner:
        enabled: true
      # Native OpenShift session namespace — the namespace budget IS the quota the
      # learner works within, so no per-session vcluster.
      vcluster:
        enabled: false
