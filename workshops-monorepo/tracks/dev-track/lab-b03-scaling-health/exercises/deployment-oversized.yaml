apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-dcs
  labels:
    app: hello-dcs
spec:
  # 3 replicas each demanding far more than the app needs. Total requested CPU/memory
  # exceeds the medium namespace budget (2000m CPU / 2Gi memory) → the ResourceQuota
  # rejects the extra Pods and they stay Pending with a quota event. You fix this in
  # the next page by right-sizing, not by asking for a bigger quota.
  replicas: 3
  selector:
    matchLabels:
      app: hello-dcs
  template:
    metadata:
      labels:
        app: hello-dcs
    spec:
      containers:
      - name: hello-dcs
        image: ${DCS_REGISTRY}/samples/hello-dcs:1.0
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "1"      # 3 × 1000m = 3000m requested, over the 2000m budget
            memory: 1Gi   # 3 × 1Gi   = 3Gi requested, over the 2Gi budget
          limits:
            cpu: "1"
            memory: 1Gi
