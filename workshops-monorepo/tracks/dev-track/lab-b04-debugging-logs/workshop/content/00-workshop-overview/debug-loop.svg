<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="sans-serif">
  <rect x="0" y="0" width="720" height="280" fill="#f5f7fa" stroke="#c5ced6"/>
  <text x="360" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2b3a">The debugging loop — the same four steps every time</text>

  <!-- Observe -->
  <rect x="30" y="70" width="140" height="70" rx="6" fill="#e8f0f7" stroke="#3b7dd8"/>
  <text x="100" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b4a86">1. Observe</text>
  <text x="100" y="120" text-anchor="middle" font-size="10" fill="#5a6b7b">get · describe</text>
  <text x="100" y="133" text-anchor="middle" font-size="10" fill="#5a6b7b">events · logs</text>

  <line x1="170" y1="105" x2="245" y2="105" stroke="#5a6b7b" stroke-width="2" marker-end="url(#a)"/>

  <!-- Hypothesise -->
  <rect x="245" y="70" width="140" height="70" rx="6" fill="#eef3ee" stroke="#4a9a5a"/>
  <text x="315" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c6a3a">2. Hypothesise</text>
  <text x="315" y="120" text-anchor="middle" font-size="10" fill="#5a6b7b">signature →</text>
  <text x="315" y="133" text-anchor="middle" font-size="10" fill="#5a6b7b">likely cause</text>

  <line x1="385" y1="105" x2="460" y2="105" stroke="#5a6b7b" stroke-width="2" marker-end="url(#a)"/>

  <!-- Fix -->
  <rect x="460" y="70" width="140" height="70" rx="6" fill="#fbeee8" stroke="#c8702a"/>
  <text x="530" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a4a12">3. Fix</text>
  <text x="530" y="120" text-anchor="middle" font-size="10" fill="#5a6b7b">edit manifest</text>
  <text x="530" y="133" text-anchor="middle" font-size="10" fill="#5a6b7b">oc apply</text>

  <!-- Fix -> Verify (down) -->
  <line x1="530" y1="140" x2="530" y2="180" stroke="#5a6b7b" stroke-width="2" marker-end="url(#a)"/>

  <!-- Verify -->
  <rect x="460" y="180" width="140" height="60" rx="6" fill="#f3eef7" stroke="#7a4ad8"/>
  <text x="530" y="208" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a2c86">4. Verify</text>
  <text x="530" y="226" text-anchor="middle" font-size="10" fill="#5a6b7b">Ready? serving?</text>

  <!-- Verify loops back to Observe if still broken -->
  <path d="M460,210 L100,210 L100,140" fill="none" stroke="#9aa7b3" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#a)"/>
  <text x="280" y="204" text-anchor="middle" font-size="10" fill="#7a8794">still broken? observe again</text>

  <text x="360" y="266" text-anchor="middle" font-size="10" fill="#5a6b7b">Same as reading the boot console before you rebuild the VM — look first, act once.</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a6b7b"/>
    </marker>
  </defs>
</svg>
