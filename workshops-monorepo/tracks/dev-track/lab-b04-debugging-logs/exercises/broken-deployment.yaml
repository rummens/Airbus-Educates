apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-dcs
  labels:
    app: hello-dcs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-dcs
  template:
    metadata:
      labels:
        app: hello-dcs
    spec:
      containers:
      - name: hello-dcs
        # SEEDED FAULT: tag :2.0 is not mirrored to the DCS Harbor registry, so the
        # image cannot be pulled (ImagePullBackOff). The fix is a single edit: :2.0 -> :1.0.
        # Image pulled from the DCS Harbor registry via the DCS_REGISTRY env var.
        image: ${DCS_REGISTRY}/samples/hello-dcs:2.0
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 64Mi
