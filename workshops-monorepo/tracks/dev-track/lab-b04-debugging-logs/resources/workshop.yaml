apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-b04-debugging-logs
  labels:
    academy.dcs/track: dev
    academy.dcs/order: "40"
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  title: Debugging & Logs
  description: Diagnose a broken workload the way you would on DCS — read logs, events and describe, find the root cause of a pre-seeded fault, fix it, and confirm recovery.
  duration: 35m
  difficulty: intermediate
  labels:
    - name: module
      value: "B-Developer"
  publish:
    image: "$(image_repository)/lab-b04-debugging-logs-files:$(workshop_version)"
    files:
    - directory:
        path: .
      includePaths:
      - /workshop/**
      - /exercises/**
      - /README.md
  workshop:
    image: "{{ .Values.workshopImages.base }}"
    files:
    {{- if .Values.workshopContent.useGit }}
    - git:
        url: "{{ .Values.workshopContent.gitUrl }}"
        ref: "{{ .Values.workshopContent.gitRef }}"
      includePaths:
      - "{{ .Values.workshopContent.tracksRoot }}/dev-track/lab-b04-debugging-logs/workshop/**"
      - "{{ .Values.workshopContent.tracksRoot }}/dev-track/lab-b04-debugging-logs/exercises/**"
      - "{{ .Values.workshopContent.tracksRoot }}/dev-track/lab-b04-debugging-logs/README.md"
      newRootPath: "{{ trimPrefix "/" .Values.workshopContent.tracksRoot }}/dev-track/lab-b04-debugging-logs"
    {{- else }}
    - image:
        url: "$(image_repository)/lab-b04-debugging-logs-files:$(workshop_version)"
    {{- end }}
  session:
    # DCS_REGISTRY is the single terminal/manifest source for the sample-image
    # registry (Plane 3). Keep it in sync with dcs_registry in workshop/config.yaml,
    # which is the content-rendering copy. Placeholder value — re-pointable per deploy.
    env:
    - name: DCS_REGISTRY
      value: "harbor.example.dcs/dcs-academy"
    # Pre-deploy the sample app BROKEN so the learner lands on a failing workload.
    # Seeded fault: image tag :2.0 is NOT mirrored to Harbor -> ImagePullBackOff.
    # The learner diagnoses it and fixes the tag to :1.0 on the fix page.
    # session.objects cannot read $(...) params or the DCS_REGISTRY env, so the
    # registry is hardcoded here — keep it in sync with DCS_REGISTRY above.
    objects:
    - apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hello-dcs
        labels:
          app: hello-dcs
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: hello-dcs
        template:
          metadata:
            labels:
              app: hello-dcs
          spec:
            containers:
            - name: hello-dcs
              image: harbor.example.dcs/dcs-academy/samples/hello-dcs:2.0
              ports:
              - containerPort: 8080
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
    # Stable address so recovery can be verified over HTTP once a Pod is Ready.
    - apiVersion: v1
      kind: Service
      metadata:
        name: hello-dcs
        labels:
          app: hello-dcs
      spec:
        selector:
          app: hello-dcs
        ports:
        - port: 8080
          targetPort: 8080
    namespaces:
      budget: medium
      security:
        token:
          enabled: true
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      console:
        enabled: true
      examiner:
        enabled: true
      # Native OpenShift session namespace — no per-session vcluster needed.
      vcluster:
        enabled: false
