# The same Deployment shape you've used since A02, now pointed at the image
# *you* built in this lab instead of a pre-built Harbor sample. The image path
# below resolves to your session-scoped Harbor project, where the BuildConfig's
# push landed.
#
# Apply with: envsubst < deployment.yaml | oc apply -f -
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-dcs-built
  labels:
    app: hello-dcs-built
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-dcs-built
  template:
    metadata:
      labels:
        app: hello-dcs-built
    spec:
      containers:
      - name: hello-dcs
        image: ${DCS_REGISTRY}/${SESSION_NAMESPACE}/hello-dcs-built:latest-built
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 64Mi
