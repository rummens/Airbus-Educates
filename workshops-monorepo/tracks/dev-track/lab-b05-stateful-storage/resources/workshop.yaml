apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-b05-stateful-storage
  labels:
    academy.dcs/track: dev
    academy.dcs/order: "50"
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  title: Stateful Workloads & Storage
  description: Give the sample app persistence — request a PVC from a DCS storage class, mount it, write data, and prove the data survives a pod restart.
  duration: 35m
  difficulty: intermediate
  labels:
    - name: module
      value: "B-Developer"
  publish:
    image: "$(image_repository)/lab-b05-stateful-storage-files:$(workshop_version)"
    files:
    - directory:
        path: .
      includePaths:
      - /workshop/**
      - /exercises/**
      - /README.md
  workshop:
    image: "{{ .Values.workshopImages.base }}"
    files:
    {{- if .Values.workshopContent.useGit }}
    - git:
        url: "{{ .Values.workshopContent.gitUrl }}"
        ref: "{{ .Values.workshopContent.gitRef }}"
      includePaths:
      - /workshops-monorepo/tracks/dev-track/lab-b05-stateful-storage/workshop/**
      - /workshops-monorepo/tracks/dev-track/lab-b05-stateful-storage/exercises/**
      - /workshops-monorepo/tracks/dev-track/lab-b05-stateful-storage/README.md
      newRootPath: workshops-monorepo/tracks/dev-track/lab-b05-stateful-storage
    {{- else }}
    - image:
        url: "$(image_repository)/lab-b05-stateful-storage-files:$(workshop_version)"
    {{- end }}
  session:
    # DCS_REGISTRY is the single terminal/manifest source for the sample-image
    # registry (Plane 3). Keep it in sync with dcs_registry in workshop/config.yaml,
    # which is the content-rendering copy. Placeholder value — re-pointable per deploy.
    # DCS_STORAGE_CLASS is the storage-class name used by the exercise PVC manifest
    # applied from the terminal (via envsubst). It mirrors dcs_storage_class in
    # workshop/config.yaml (the content-rendering copy) — keep the two in sync.
    # Placeholder value until confirmed with the storage team.
    env:
    - name: DCS_REGISTRY
      value: "harbor.example.dcs/dcs-academy"
    - name: DCS_STORAGE_CLASS
      value: "dcs-block"
    namespaces:
      budget: medium
      security:
        token:
          enabled: true
    # Pre-deploy the stateless hello-dcs app (as it would already be running from B01)
    # so page 01 can demonstrate that a container's filesystem is ephemeral before the
    # learner adds a volume. Session objects don't expand env vars, so the image string
    # mirrors the DCS_REGISTRY placeholder above — re-point both together per deploy.
    objects:
    - apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hello-dcs
        labels:
          app: hello-dcs
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: hello-dcs
        template:
          metadata:
            labels:
              app: hello-dcs
          spec:
            containers:
            - name: hello-dcs
              image: harbor.example.dcs/dcs-academy/samples/hello-dcs:1.0
              ports:
              - containerPort: 8080
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      console:
        enabled: true
      examiner:
        enabled: true
      # Native OpenShift session namespace — no per-session vcluster needed.
      vcluster:
        enabled: false
