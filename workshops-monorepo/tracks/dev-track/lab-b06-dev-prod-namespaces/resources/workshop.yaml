apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-b06-dev-prod-namespaces
  # --- DCS portal catalog metadata (read off metadata, NOT spec) ----
  labels:
    academy.dcs/track: dev
    academy.dcs/order: "60"
    # Lifecycle label reasoning (this lab is the one where the OUTER vs INNER
    # namespace distinction actually matters):
    #   - This lab has the learner create a Route. The vcluster's control
    #     plane AND everything it syncs to the host run INSIDE this lab's own
    #     Educates session namespace — a Route created in the vcluster's
    #     "prod" namespace is synced down and materialises as a real
    #     route.openshift.io object physically inside this session namespace.
    #   - The lifecycle rule is literal: "prod if the workshop creates (or has
    #     the learner create) a Route or Ingress". That is exactly what
    #     happens here, so the OUTER session namespace is prod — this also
    #     avoids the host-level Route-admission policy rejecting the synced
    #     object for an unrelated reason (this session's own namespace not
    #     being prod), which would break the exercise for a reason that has
    #     nothing to do with the DEV/PROD lesson being taught.
    #   - The INNER dev/prod distinction the lesson is actually about is a
    #     SEPARATE label (dcs.airbus/namespace-type) on the two namespaces the
    #     learner creates inside the vcluster — see exercises/*-namespace.yaml
    #     and the dcs-namespace-type-policy ClusterPolicy. That inner label is
    #     what the lesson's Kyverno policy keys off, independent of this
    #     outer label.
    dcs.airbus.com/lifecycle: prod
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  title: "DEV vs PROD Namespaces & Policies"
  description: The two DCS namespace types differ by policy posture. See a DEV and a PROD namespace side by side, watch a Route get blocked in DEV and succeed in PROD, inspect the Kyverno policy PROD enforces, and understand why you promote instead of editing PROD in place.
  duration: 20m
  difficulty: intermediate
  labels:
    - name: module
      value: "B-Developer"
  publish:
    image: "$(image_repository)/lab-b06-dev-prod-namespaces-files:$(workshop_version)"
    files:
    - directory:
        path: .
      includePaths:
      - /workshop/**
      - /exercises/**
      - /README.md
  workshop:
    image: "{{ .Values.workshopImages.base }}"
    files:
    {{- if .Values.workshopContent.useGit }}
    - git:
        url: "{{ .Values.workshopContent.gitUrl }}"
        ref: "{{ .Values.workshopContent.gitRef }}"
      includePaths:
      - "{{ .Values.workshopContent.tracksRoot }}/dev-track/lab-b06-dev-prod-namespaces/workshop/**"
      - "{{ .Values.workshopContent.tracksRoot }}/dev-track/lab-b06-dev-prod-namespaces/exercises/**"
      - "{{ .Values.workshopContent.tracksRoot }}/dev-track/lab-b06-dev-prod-namespaces/README.md"
      newRootPath: "{{ trimPrefix "/" .Values.workshopContent.tracksRoot }}/dev-track/lab-b06-dev-prod-namespaces"
    {{- else }}
    - image:
        url: "$(image_repository)/lab-b06-dev-prod-namespaces-files:$(workshop_version)"
    {{- end }}
  session:
    # DCS_REGISTRY: single terminal source for the sample-image registry (Plane 3).
    # Keep in sync with dcs_registry in workshop/config.yaml. hello-dcs.yaml carries
    # a ${DCS_REGISTRY} reference and is applied via `envsubst < f.yaml | oc apply -f -`.
    env:
    - name: DCS_REGISTRY
      value: "harbor.example.dcs/dcs-academy"
    namespaces:
      # vcluster runs a control plane + CoreDNS and this lab additionally runs a
      # Kyverno policy engine inside it (see the vcluster note below) — needs headroom.
      budget: large
      security:
        policy: restricted
        token:
          enabled: true
    # vcluster gives the learner a throwaway cluster with cluster-admin so they can
    # create two REAL namespaces (dev, prod) side by side and apply a cluster-scoped
    # ClusterPolicy — none of that is possible in a plain OpenShift session namespace.
    # This is the one Developer-track lab where that isolation is worth the cost.
    #
    # PLATFORM PRECONDITION (design note, carried from the workshop plan): the
    # DEV-vs-PROD contrast this lab teaches depends on the vcluster having Kyverno's
    # CRDs/controller available (so exercises/kyverno-policy.yaml can actually enforce
    # something) and its Route API synced from the host cluster (so hello-dcs-route.yaml
    # can be admitted/rejected for real). Whether every vcluster the platform hands out
    # includes those by default is an open platform question (see
    # dcs-academy/planning/workshop-plans/lab-b06-dev-prod-namespaces.md, Design Notes,
    # and its "tasks.md" cross-reference to confirm vcluster sizing/availability on DCS).
    # If a deployment's vcluster lacks Kyverno, pages 02-03's live enforcement steps
    # should be delivered as annotated, screenshot-driven steps instead (as the old A03
    # planned) — the examiner tests below make real assertions and will fail loudly
    # rather than fake a pass if that precondition isn't met; see
    # local-cluster-deployment-reference.md's test-integrity note on naming coverage
    # gaps instead of hiding them.
    objects:
    # Required whenever vcluster is enabled on OpenShift, or CoreDNS crashloops in the
    # `-vc` namespace (Educates pins it to the baseline SCC, which rejects
    # NET_BIND_SERVICE).
    - apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: educates-vcluster-scc
        namespace: $(vcluster_namespace)
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: educates-privileged-scc
      subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: Group
        name: system:serviceaccounts:$(vcluster_namespace)
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
      console:
        enabled: true
      examiner:
        enabled: true
      vcluster:
        enabled: true
