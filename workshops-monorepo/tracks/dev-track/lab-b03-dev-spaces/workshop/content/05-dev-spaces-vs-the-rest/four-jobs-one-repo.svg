<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="sans-serif">
  <rect x="0" y="0" width="760" height="360" fill="#f5f7fa" stroke="#c5ced6"/>
  <text x="380" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2b3a">Same git repo, four different jobs</text>

  <rect x="270" y="42" width="220" height="42" rx="8" fill="#fdf3e3" stroke="#c9932e" stroke-width="2"/>
  <text x="380" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#8a6314">git repo: hello-dcs source</text>

  <!-- fan-out lines -->
  <line x1="330" y1="84" x2="110" y2="112" stroke="#9aa7b3" stroke-width="1.6"/>
  <line x1="360" y1="84" x2="290" y2="112" stroke="#9aa7b3" stroke-width="1.6"/>
  <line x1="400" y1="84" x2="470" y2="112" stroke="#9aa7b3" stroke-width="1.6"/>

  <!-- Educates editor (dashed / greyed, scaffolding only) -->
  <rect x="30" y="112" width="160" height="80" rx="8" fill="#eceff2" stroke="#9aa7b3" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="110" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="#6b7b8b">Educates editor</text>
  <text x="110" y="152" text-anchor="middle" font-size="9.5" fill="#6b7b8b">view/edit exercise files</text>
  <text x="110" y="166" text-anchor="middle" font-size="9.5" fill="#6b7b8b">for THIS training only —</text>
  <text x="110" y="180" text-anchor="middle" font-size="9.5" fill="#6b7b8b">not a real workflow</text>

  <!-- Dev Spaces (blue, loops back) -->
  <rect x="210" y="112" width="160" height="80" rx="8" fill="#e8f0f7" stroke="#3b7dd8" stroke-width="2"/>
  <text x="290" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b4a86">Dev Spaces (B03)</text>
  <text x="290" y="152" text-anchor="middle" font-size="9.5" fill="#1b4a86">write + run source</text>
  <text x="290" y="166" text-anchor="middle" font-size="9.5" fill="#1b4a86">live, in-cluster —</text>
  <text x="290" y="180" text-anchor="middle" font-size="9.5" fill="#1b4a86">the fast inner loop</text>

  <!-- BuildConfig -> Image -> oc apply chain -->
  <rect x="390" y="112" width="150" height="80" rx="8" fill="#eef3ee" stroke="#4a9a5a" stroke-width="2"/>
  <text x="465" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c6a3a">BuildConfig (B02)</text>
  <text x="465" y="152" text-anchor="middle" font-size="9.5" fill="#2c6a3a">finished source →</text>
  <text x="465" y="166" text-anchor="middle" font-size="9.5" fill="#2c6a3a">built image</text>
  <text x="465" y="180" text-anchor="middle" font-size="9.5" fill="#2c6a3a">in Harbor</text>

  <line x1="540" y1="152" x2="570" y2="152" stroke="#5a6b7b" stroke-width="2"/>
  <polygon points="570,152 562,148 562,156" fill="#5a6b7b"/>

  <rect x="575" y="112" width="155" height="80" rx="8" fill="#eef3ee" stroke="#4a9a5a" stroke-width="2"/>
  <text x="652" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c6a3a">oc apply (A02/B01)</text>
  <text x="652" y="152" text-anchor="middle" font-size="9.5" fill="#2c6a3a">runs that image in a</text>
  <text x="652" y="166" text-anchor="middle" font-size="9.5" fill="#2c6a3a">real namespace —</text>
  <text x="652" y="180" text-anchor="middle" font-size="9.5" fill="#2c6a3a">deploy</text>

  <text x="380" y="230" text-anchor="middle" font-size="11" fill="#5a6b7b">Write it (Dev Spaces) → build it (BuildConfig) → run it for real (oc apply).</text>
  <text x="380" y="248" text-anchor="middle" font-size="11" fill="#5a6b7b">The Educates editor never joins that chain — it's this training's scaffolding only.</text>

  <text x="380" y="290" text-anchor="middle" font-size="10" fill="#8a97a3">A workspace with no BuildConfig never produces a shippable image;</text>
  <text x="380" y="306" text-anchor="middle" font-size="10" fill="#8a97a3">a BuildConfig with no oc apply never runs anywhere real.</text>
</svg>
