<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" font-family="sans-serif">
  <rect x="0" y="0" width="720" height="260" fill="#f5f7fa" stroke="#c5ced6"/>
  <text x="360" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b2b3a">How your browser reaches the app</text>

  <!-- Browser -->
  <rect x="24" y="70" width="140" height="70" rx="6" fill="#e8f0f7" stroke="#3b7dd8"/>
  <text x="94" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b4a86">Your Browser</text>
  <text x="94" y="118" text-anchor="middle" font-size="10" fill="#5a6b7b">the dashboard tab</text>

  <!-- arrow -->
  <line x1="164" y1="105" x2="224" y2="105" stroke="#5a6b7b" stroke-width="2" marker-end="url(#a)"/>

  <!-- Session ingress -->
  <rect x="224" y="70" width="150" height="70" rx="6" fill="#eef3ee" stroke="#4a9a5a"/>
  <text x="299" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c6a3a">Session ingress</text>
  <text x="299" y="113" text-anchor="middle" font-size="10" fill="#5a6b7b">HTTPS + auth,</text>
  <text x="299" y="127" text-anchor="middle" font-size="10" fill="#5a6b7b">managed for you</text>

  <!-- arrow -->
  <line x1="374" y1="105" x2="434" y2="105" stroke="#5a6b7b" stroke-width="2" marker-end="url(#a)"/>

  <!-- Service -->
  <rect x="434" y="70" width="120" height="70" rx="6" fill="#f3eef7" stroke="#8a5ac8"/>
  <text x="494" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#5a2c86">Service</text>
  <text x="494" y="118" text-anchor="middle" font-size="10" fill="#5a6b7b">hello-dcs:8080</text>

  <!-- arrow -->
  <line x1="554" y1="105" x2="600" y2="105" stroke="#5a6b7b" stroke-width="2" marker-end="url(#a)"/>

  <!-- Pods -->
  <rect x="600" y="78" width="96" height="24" rx="4" fill="#fbeee8" stroke="#c8702a"/>
  <text x="648" y="95" text-anchor="middle" font-size="11" fill="#8a4a12">Pod</text>
  <rect x="600" y="108" width="96" height="24" rx="4" fill="#fbeee8" stroke="#c8702a"/>
  <text x="648" y="125" text-anchor="middle" font-size="11" fill="#8a4a12">Pod</text>

  <text x="360" y="186" text-anchor="middle" font-size="11" fill="#1b2b3a">The session ingress is the self-service way to open a DEV app in a browser.</text>
  <text x="360" y="206" text-anchor="middle" font-size="11" fill="#1b2b3a">A real external Route would sit where the ingress is — but needs a PROD namespace.</text>
  <text x="360" y="230" text-anchor="middle" font-size="10" fill="#5a6b7b">(Like a reverse proxy in front of your VMs: one public address, many instances behind.)</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a6b7b"/>
    </marker>
  </defs>
</svg>
