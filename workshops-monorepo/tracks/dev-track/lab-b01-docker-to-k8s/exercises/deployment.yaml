# The migration target for the compose `hello-dcs` service. `image:` still has a
# placeholder — 02-container-to-deployment.md has you fill it in with the Harbor
# reference, then apply with:
#   envsubst < deployment.yaml | oc apply -f -
# (never a plain `oc apply -f deployment.yaml` — the ${DCS_REGISTRY} placeholder
# needs the registry substituted first).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-dcs
  labels:
    app: hello-dcs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-dcs
  template:
    metadata:
      labels:
        app: hello-dcs
    spec:
      containers:
      - name: hello-dcs
        image: REPLACE_WITH_HARBOR_IMAGE
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 64Mi
