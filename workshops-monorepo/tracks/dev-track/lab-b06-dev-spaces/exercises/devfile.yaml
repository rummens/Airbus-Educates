schemaVersion: 2.2.0
metadata:
  name: hello-dcs
  # A devfile describes a reproducible, in-cluster developer environment. On DCS every
  # image it references comes from Harbor via the registry variable — NO external devfile
  # registries or public images (the platform is air-gapped).
components:
- name: tools
  container:
    # Harbor-mirrored Universal Developer Image (UDI). Mirror your chosen stack into Harbor;
    # ${DCS_REGISTRY} resolves to the DCS Harbor project at workspace-create time.
    image: ${DCS_REGISTRY}/devspaces/udi:latest
    memoryLimit: 512Mi
    mountSources: true
    endpoints:
    - name: http-hello
      targetPort: 8080
      exposure: public
commands:
- id: run
  exec:
    component: tools
    workingDir: ${PROJECT_SOURCE}
    # Start the sample app inside the workspace, on 8080, exactly like it runs as a Pod.
    commandLine: "python3 -m http.server 8080"
    group:
      kind: run
      isDefault: true
