# The SAME app, SAME replica count as after page 01's scale-up — but with
# intentionally large resources.requests/limits per container. Applied in place
# of the running Deployment, this makes the rollout's new ReplicaSet ask for
# more than the namespace budget has left, so its Pod(s) are rejected by the
# ResourceQuota admission check instead of scheduling. That is the point of
# this file: to trigger, then let you diagnose, a quota rejection.
# Apply with: envsubst < deployment-oversized.yaml | oc apply -f -
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-dcs
  labels:
    app: hello-dcs
spec:
  replicas: 4
  selector:
    matchLabels:
      app: hello-dcs
  template:
    metadata:
      labels:
        app: hello-dcs
    spec:
      containers:
      - name: hello-dcs
        image: ${DCS_REGISTRY}/samples/hello-dcs:1.0
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 700m
            memory: 700Mi
          limits:
            cpu: 700m
            memory: 700Mi
