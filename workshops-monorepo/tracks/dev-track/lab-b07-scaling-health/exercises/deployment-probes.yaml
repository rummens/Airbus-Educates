# The target, healthy hello-dcs: the same replica count, right-sized
# resources.requests/limits that comfortably fit the namespace budget, and
# liveness + readiness probes against the app's own endpoints (readiness on
# "/", liveness on the dedicated "/healthz"). Applying this file is what
# recovers the app after the oversized manifest (page 02/03) and is also what
# page 04 edits in place to demonstrate a readiness failure.
# Apply with: envsubst < deployment-probes.yaml | oc apply -f -
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-dcs
  labels:
    app: hello-dcs
spec:
  replicas: 4
  selector:
    matchLabels:
      app: hello-dcs
  template:
    metadata:
      labels:
        app: hello-dcs
    spec:
      containers:
      - name: hello-dcs
        image: ${DCS_REGISTRY}/samples/hello-dcs:1.0
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
