# =============================================================================
# dcs-academy-workshops — values
# =============================================================================
# Deliberately small. There is NO workshop/track list here — the catalog is the
# git tree (globbed at render). These are only cross-cutting defaults + the
# single TrainingPortal's settings.
# =============================================================================

enabled: true

global:
  registry:
    # Private/mirror registry host. EMPTY = pull from ghcr (dev). When set, the
    # portal image ref is rewritten to this host (air-gap → Harbor).
    host: ""
    pullSecret: ""

# Extra labels merged onto the Track CRs + TrainingPortal this chart emits.
# (Workshop CRs are emitted verbatim from each lab's file, so label those there.)
labels: {}

# The one Educates TrainingPortal that hosts the whole catalog. Its name +
# hostname MUST match the portal chart (educates.portalName / auth.hostname):
# the portal app reads this CR's status for the robot REST creds + backend ns.
educates:
  portalName: dcst-dcs-backend

portal:
  title: "DCS Enablement"
  # Public academy host = portal chart's auth.hostname. Educates uses it for
  # PORTAL_HOSTNAME (URLs, cookies, CSP). The oauth-proxy claims it.
  hostname: academy
  registration:
    type: anonymous            # oauth-proxy is the sole gate; no Educates signup
  sessions:
    maximum: 3
  workshop:
    reserved: 1
    initial: 0
  # Default per-workshop session lifecycle for the TrainingPortal list. Override
  # per lab with annotations academy.dcs/expires + academy.dcs/orphaned.
  expires: 60m
  orphaned: 5m

feedback:
  # Educates analytics webhook → the portal app's /analytics (CNPG-backed).
  # Default targets the portal chart's Service by its known name+ns.
  analyticsWebhookUrl: "http://dcs-academy-portal.dcs-academy-portal.svc:8080/analytics"

# CRC-ONLY workaround for the Educates BACKEND portal pod. That pod (operator-owned,
# not in this chart) SIGILLs on Apple-Silicon CRC the same way — but we can't set its
# env declaratively. When enabled, a PostSync hook Job (63-crc-armcap-job.yaml)
# injects OPENSSL_armcap=0 into the training-portal Deployment after each sync. Leave
# OFF except on CRC. See HANDOVER-portal-bringup.md.
crcWorkaround:
  enabled: false
  # Needs `oc` + bash. registry.redhat.io is already pullable on CRC (oauth-proxy
  # uses it). Override for air-gap.
  image: registry.redhat.io/openshift4/ose-cli:latest