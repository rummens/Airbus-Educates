# =============================================================================
# dcs-academy-workshops — values
# =============================================================================
# Deliberately small. There is NO workshop/track list here — the catalog is the
# git tree (globbed at render). These are only cross-cutting defaults + the
# single TrainingPortal's settings.
# =============================================================================

enabled: true

global:
  registry:
    # Private/mirror registry host. EMPTY = pull from ghcr (dev). When set, the
    # portal image ref is rewritten to this host (air-gap → Harbor).
    host: ""
    pullSecret: ""

# Session container images labs run in. `base` is the default; add named
# variants for labs that need something else (e.g. extra tooling). A lab's
# authored workshop.yaml picks one via {{ .Values.workshopImages.<name> }} —
# templates/workshops.yaml renders those files through `tpl`. Air-gap: repoint
# at Harbor. Edit here, not per-lab.
workshopImages:
  base: ghcr.io/rummens/dcs-workshop-base:develop
  # tools: ghcr.io/rummens/dcs-workshop-tools:dev

# Where each lab's CONTENT (workshop/, exercises/, README.md) is fetched from.
#   useGit=false (default, prod): the published $(image_repository)/<lab>-files
#     image (needs `educates publish` → Harbor/registry).
#   useGit=true (CRC/dev): pull straight from this git repo — no publish step,
#     works when the -files content images aren't built. Air-gapped prod can't
#     reach GitHub, so keep this false there and mirror content to the registry.
workshopContent:
  useGit: true
  gitUrl: https://github.com/rummens/Airbus-Educates
  gitRef: origin/main
  # Root path prefix for git-source includePaths. Mirrors the monorepo layout
  # (e.g. /workshops-monorepo/tracks/...). Override per-cluster if the tracks
  # live elsewhere (air-gap mirror, different repo, etc).
  tracksRoot: /workshops-monorepo/tracks

# Extra labels merged onto the Track CRs + TrainingPortal this chart emits.
# (Workshop CRs are NOT verbatim — rendered through `tpl`, so .Values work there.)
labels: {}

# Author params shared by EVERY workshop, controlled here instead of in each lab's
# workshop/config.yaml. The chart injects them as session env on every workshop
# entry in the TrainingPortal; each config.yaml param carries `aliases: [ENV]` so
# it reads the env (falling back to its own literal default when unset — e.g. a
# plain content preview). Change a value here + resync → every lab updates.
params:
  productName: "Digital Container Service (DCS)"
  productShort: "DCS"
  dcsRegistry: "ghcr.io/rummens"
  dcsDocsBaseUrl: "https://docs.example.dcs"

# The one Educates TrainingPortal that hosts the whole catalog. Its name +
# hostname MUST match the portal chart (educates.portalName / auth.hostname):
# the portal app reads this CR's status for the robot REST creds + backend ns.
educates:
  portalName: dcst

portal:
  title: "DCS Enablement"
  # Public academy host = portal chart's auth.hostname. Educates uses it for
  # PORTAL_HOSTNAME (URLs, cookies, CSP). The Flask portal (SA-as-OAuthClient) owns it.
  hostname: academy
  registration:
    type: anonymous            # portal auth.py is the sole gate; no Educates signup
  sessions:
    maximum: 3
  workshop:
    # reserved:0 — no warm spare pool. A spare's expires/orphaned clocks run from
    # session CREATION, so a spare sitting > orphaned goes stale and is orphan-reaped
    # the instant it's allocated (→ dead oauth client → "400 Invalid client_id" on
    # rewarm). With maximum:3 a warm pool buys little; pay the ~30-60s cold start.
    reserved: 0
    initial: 0
  # Default per-workshop session lifecycle for the TrainingPortal list. Override
  # per lab with annotations academy.dcs/expires + academy.dcs/orphaned.
  expires: 60m
  # Grace before a session with no connected browser (never-accessed OR backgrounded
  # tab whose dashboard websocket dropped) is reaped. 40m so a learner working in
  # another tab isn't killed long before the 60m expires hard cap. Must stay < expires.
  orphaned: 40m

feedback:
  # Educates analytics webhook → the portal app's /analytics (CNPG-backed).
  # Default targets the portal chart's Service by its known name+ns.
  analyticsWebhookUrl: "http://dcs-academy-portal.dcs-academy-portal.svc:8080/analytics"

# CRC-ONLY workaround for the Educates BACKEND portal pod. That pod (operator-owned,
# not in this chart) SIGILLs on Apple-Silicon CRC the same way — but we can't set its
# env declaratively. When enabled, a PostSync hook Job (63-crc-armcap-job.yaml)
# injects OPENSSL_armcap=0 into the training-portal Deployment after each sync. Leave
# OFF except on CRC. See HANDOVER-portal-bringup.md.
# --
# Note that the image must still be synced even if the workaround is disabled. The image is needed for the
# memory limit fix.
crcWorkaround:
  enabled: false
  # Needs `oc` + bash. registry.redhat.io is already pullable on CRC (oauth-proxy
  # uses it). Override for air-gap.
  image: registry.redhat.io/openshift4/ose-cli:latest

# After each sync, tell the portal app to refresh its cached catalog so a
# Workshop/Track CR change (add/remove/edit a lab) shows up immediately instead of
# after the portal's TTL. A PostSync hook Job POSTs /admin/rescan on the portal
# Service. Auth is a shared bearer token — set `token` to the SAME value as the
# portal chart's `rescan.token` (empty here + empty there = no auth, which the
# portal only accepts if it too has no token configured).
catalogRescan:
  enabled: true
  # In-cluster portal Service URL (same host as feedback.analyticsWebhookUrl).
  portalUrl: "http://dcs-academy-portal.dcs-academy-portal.svc:8080"
  token: "super-secret"
  # Any image with python3 (stdlib urllib only). Reuse the portal image so there's
  # nothing extra to mirror for air-gap. Override for a private registry.
  image: ghcr.io/rummens/dcs-academy-portal:dev
  # Mount the cluster's trusted CA bundle so the job trusts the portal endpoint's TLS
  # cert (signed by the cluster/router CA, not a public one) — without it the POST
  # fails with an SSL cert-verification error. On OpenShift the cluster-network-operator
  # injects the merged bundle (system + additionalTrustedCA/proxy CAs) under
  # `ca-bundle.crt` into a ConfigMap labelled config.openshift.io/inject-trusted-cabundle.
  # Set existingConfigMap to reuse one that already holds ca-bundle.crt instead.
  trustedCA:
    enabled: true
    existingConfigMap: ""

# WorkshopEnvironment guard (see templates/env-guard.yaml). Two PostSync hooks that run
# after every sync: (1) reconcile drains stale/duplicate envs a rolled workshop leaves
# behind — the create/delete-only training-portal never updates an env in place, so a
# lingering stale env is what makes "start" 403; (2) validate is the gate — it fails the
# sync if any catalog workshop lacks a Running env, so a broken deploy shows Degraded in
# Argo (which retries) instead of a false green. Steady-state cleanup between syncs is the
# portal chart's sessionReaper CronJob (reapEnvironments: true).
envGuard:
  enabled: true
  # Reuse the portal image — it carries portal.reap / portal.validate. Air-gap: mirror
  # this one image (already needed for the portal + catalogRescan).
  image: ghcr.io/rummens/dcs-academy-portal:dev
  # reconcile (portal.reap): start dryRun:true to LOG what it would delete; confirm it
  # targets only stale/orphan envs+sessions, then set false to let it act.
  dryRun: false
  debug: false
  graceSeconds: 300              # never touch an env/session younger than this
  # validate gate: fail → Argo sync fails + retries; warn → log only, sync stays green.
  mode: fail
  settleSeconds: 240            # how long to wait for envs to converge before deciding
  # Env phases counted as ready. Default matches Educates' Running; widen if your
  # Educates build reports a different ready phase (a functioning env that already backs
  # a live session is treated as ready regardless, so this rarely needs changing).
  readyPhases: "Running"
