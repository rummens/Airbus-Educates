# =============================================================================
# educates-workshops — values
# =============================================================================
# Holds the workshop catalog (Workshop CRs) + a TrainingPortal that hosts them.
# Deploy AFTER the platform (educates-openshift with portal.enabled=false).
# Add workshops by appending to `workshops:` — the portal hosts every entry.
# =============================================================================

# Master switch for this chart. false = render nothing (toggle the whole chart
# on/off from ArgoCD or helm). Enabled by default.
enabled: true

global:
  registry:
    # Private/mirror registry host. EMPTY = pull from upstream. When set, workshop
    # content IMAGES (source.type=image) rewrite to this host. git/http sources are
    # URLs and are not rewritten — mirror the git repo / URL for those in air-gap.
    host: ""
    pullSecret: ""

# Cluster wildcard ingress domain. Per-cluster — override via the ArgoCD env file
# (argocd/envs/workshops-<cluster>.yaml). Used for the portal UI host, the auth
# proxy host, and the optional explicit Route.
ingressDomain: apps-crc.testing

# -----------------------------------------------------------------------------
# The portal that hosts the workshops below.
# -----------------------------------------------------------------------------
portal:
  # Portal name drives the DYNAMIC namespaces Educates creates per session
  # (<name>-w0N, <name>-w0N-xxxx, ...-vc) AND the backend namespace <name>-ui.
  # Keep the dcst- prefix so every user-started (dynamic) namespace sorts under
  # dcst-*. The Educates portal in <name>-ui is now just the REST/session backend
  # (the landing UI is the dcs-academy-portal chart); -backend names it as such.
  # MUST match the dcs-academy-portal chart's educates.portalName.
  name: dcst-dcs-backend
  title: "DCS Enablement"
  ingress:
    # Public portal hostname, independent of portal.name → academy.<domain>.
    hostname: academy
  registration:
    # anonymous -> no portal signup form. With auth.enabled the OpenShift-OAuth
    # proxy is the sole gate, so only SSO-authenticated users reach the portal.
    # (one-step would add an Educates local-account form — not wanted.)
    type: anonymous
  sessions:
    maximum: 3
  route:
    # Optional explicit Route straight to the Educates backend (bypasses the SSO
    # gate) — for non-auth/debug setups only. OFF by default; the SSO gate and the
    # academy host live in the dcs-academy-portal chart now.
    enabled: false
    tls: edge

# NOTE: the OpenShift OAuth gate (oauth-proxy + host-reservation VAP + the -ui
# NetworkPolicy) moved to the dcs-academy-portal chart — it fronts the custom
# portal at the academy host and keeps this Educates backend in-cluster only.

# -----------------------------------------------------------------------------
# Phase 3 passthrough — per-session vcluster (requires platform vcluster support).
# When true, every workshop gets session.applications.vcluster + a larger budget
# and baseline policy. Toggle per workshop with `<ws>.session.vcluster: true/false`
# to override this global default.
# -----------------------------------------------------------------------------
vcluster:
  # Default ON for the x86 cluster; disable for constrained clusters.
  enabled: true
  budget: large

# -----------------------------------------------------------------------------
# End-of-workshop feedback collector (see dcs-academy/planning/feedback-capture.md).
# A tiny in-cluster service storing Likert ratings + comments in SQLite on a PV.
# Sessions reach its form via a public Route (a "Feedback" dashboard tab); the
# TrainingPortal also POSTs analytics events (one-click ratings) to it. Metrics
# are scraped by user-workload monitoring for the Grafana feedback dashboard.
# -----------------------------------------------------------------------------
feedback:
  # Master switch. When on: PVC + Deployment + Service + Route + ServiceMonitor,
  # and the TrainingPortal's analytics webhook is wired to it.
  enabled: true
  image:
    # Registry-overridable via global.registry.host (air-gap mirror).
    repository: ghcr.io/rummens/feedback-collector
    tag: dev
  # Public host for the in-session feedback form → feedback.<ingressDomain>.
  hostname: feedback
  route:
    tls: edge
  storage:
    size: 1Gi
    # Empty = cluster default StorageClass. Set to a DCS File/Block class in prod.
    className: ""
  # /admin gate. Provide adminToken (chart makes a Secret) OR existingSecret with
  # key `admin-token`. Empty (default) = /admin is DISABLED and returns 503
  # ("ADMIN_TOKEN not configured") — set one to enable the report.
  # Under GitOps do NOT commit a real token here (plaintext in git). Set it per
  # cluster via the ArgoCD Application spec.source.helm.valuesObject.feedback.adminToken,
  # or pre-create a Secret and reference it with existingSecret. selfHeal keeps it;
  # a manual `oc set env`/patch will be reverted.
  adminToken: ""
  existingSecret: ""
  # Future CNPG swap seam: set to postgres://... (needs a psycopg-enabled image).
  # Empty = SQLite on the PV (v1).
  databaseUrl: ""
  # Analytics-webhook override. Empty = the standalone feedback-collector Service.
  # Point at the custom portal once feedback is absorbed there:
  #   analyticsWebhookUrl: http://dcs-academy-portal.dcs-academy-portal.svc:8080/analytics
  # Set independently of feedback.enabled so the analytics sink survives retiring
  # the standalone collector (feedback.enabled=false).
  analyticsWebhookUrl: ""
  serviceMonitor:
    # Expose /metrics to user-workload monitoring (Thanos → Grafana).
    enabled: true
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# -----------------------------------------------------------------------------
# Workshop catalog. One Workshop CR per entry; all are hosted by the portal.
# -----------------------------------------------------------------------------
workshops:
  # lab-k8s-fundamentals, loaded straight from its GitHub repo (git source).
  - name: lab-k8s-fundamentals
    title: "Kubernetes Fundamentals"
    description: "An interactive workshop on Kubernetes fundamentals."
    # Content source. type: git | image | githubRelease | http
    source:
      type: git
      git:
        url: https://github.com/educates/lab-k8s-fundamentals
        ref: origin/main
      # For air-gap prefer an image (mirror it; rewrites via global.registry.host):
      # type: image
      image:
        repository: ghcr.io/educates/lab-k8s-fundamentals-files
        tag: "8.1"
    # Paths inside the source to serve.
    includePaths:
      - /workshop/**
      - /templates/**
      - /README.md
    session:
      budget: medium        # small|medium|large|x-large|custom
      policy: restricted    # restricted|baseline|privileged
      applications:
        terminal: true
        console: true
        editor: true
        slides: true
      # Per-workshop vcluster override. Omit to follow global vcluster.enabled.
      #   vcluster: true   -> force a per-session vcluster
      #   vcluster: false  -> opt OUT: run in a native, isolated OpenShift session
      #                       namespace instead (see the lab-openshift-operators
      #                       example below). Use for OpenShift-specific workshops
      #                       (operators, SCCs, namespace UID ranges) where a
      #                       vcluster is overhead. Set policy accordingly
      #                       (baseline/privileged) since it runs on the real cluster.
      # vcluster: true
    portal:
      expires: 60m
      orphaned: 5m

  # --- Example: a workshop that runs in a NATIVE OpenShift namespace (no vcluster)
  # even though the global default is vcluster: true. For operator/SCC/UID topics. ---
  # - name: lab-openshift-operators
  #   title: "OpenShift Operators & SCCs"
  #   description: "Native OpenShift namespace — no vcluster."
  #   source:
  #     type: git
  #     git: { url: https://github.com/educates/lab-container-basics, ref: origin/main }
  #   includePaths: [/workshop/**, /README.md]
  #   session:
  #     budget: medium
  #     policy: baseline          # or privileged, for SCC/UID work on the real cluster
  #     vcluster: false           # <-- opt out of vcluster
  #     applications: { terminal: true, console: true, editor: true }
  #   portal: { expires: 60m, orphaned: 5m }
  #   session:
  #     budget: small
  #     policy: restricted
  #     applications: { terminal: true, editor: true }
  #   portal: { expires: 60m, orphaned: 5m }
