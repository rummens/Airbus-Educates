{{- if .Values.enabled }}
{{- if and .Values.auth.enabled .Values.auth.sealedSecret.enabled }}
{{- if not .Values.auth.sealedSecret.encryptedCookieSecret }}
{{- fail "auth.sealedSecret.enabled=true requires auth.sealedSecret.encryptedCookieSecret (see values.yaml for the kubeseal command)" }}
{{- end }}
# SealedSecret for the oauth-proxy cookie secret. Encrypted value is commit-safe;
# the sealed-secrets controller unseals it to a Secret named educates-oauth-proxy
# that 40-auth.yaml mounts. Requires the bitnami sealed-secrets controller.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: educates-oauth-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "workshops.labels" . | nindent 4 }}
spec:
  encryptedData:
    cookie-secret: {{ .Values.auth.sealedSecret.encryptedCookieSecret | quote }}
  template:
    metadata:
      name: educates-oauth-proxy
      namespace: {{ .Release.Namespace }}
    type: Opaque
{{- end }}

{{- end }}
