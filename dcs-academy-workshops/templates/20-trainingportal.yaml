{{- if .Values.enabled }}
# Portal hosting every workshop in the catalog. Public UI is served at
# portal.ingress.hostname.<ingressDomain>; Educates-created namespaces use
# portal.name (dcst- prefix) so dynamic namespaces stay separate.
apiVersion: training.educates.dev/v1beta1
kind: TrainingPortal
metadata:
  name: {{ .Values.portal.name }}
  labels:
    {{- include "workshops.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  portal:
    title: {{ .Values.portal.title | quote }}
    {{- with .Values.portal.ingress }}
    ingress:
      # Portal hostname = the PUBLIC host users reach (academy). Educates uses this
      # for PORTAL_HOSTNAME → the URLs, session cookies, and CSP frame-ancestors it
      # generates, so the workshop dashboard's cross-origin iframes work when served
      # through the oauth-proxy. REQUIRED, and MUST match the dcs-academy-portal
      # chart's auth.hostname.
      #
      # The oauth-proxy (dcs-academy-portal chart) also claims this host and its VAP
      # reserves it, so Educates' own auto-published portal Route for this host is
      # denied — the proxy is the only serving route (SSO-gated), no bypass.
      hostname: {{ .hostname }}
    {{- end }}
    registration:
      type: {{ .Values.portal.registration.type }}
    updates:
      workshop: true
    sessions:
      maximum: {{ .Values.portal.sessions.maximum }}
    workshop:
      defaults:
        reserved: 1
        initial: 0
  {{- if or .Values.feedback.enabled .Values.feedback.analyticsWebhookUrl }}
  # One-click Likert ratings on the feedback page fire report-analytics-event;
  # Educates POSTs every analytics event to this webhook. Default = the standalone
  # feedback-collector; set feedback.analyticsWebhookUrl to the custom portal's
  # /analytics (e.g. http://dcs-academy-portal.dcs-academy-portal.svc:8080/analytics)
  # once feedback is absorbed there, so the sink survives retiring the collector.
  analytics:
    webhook:
      url: {{ .Values.feedback.analyticsWebhookUrl | default (printf "http://feedback-collector.%s.svc:8080/analytics" .Release.Namespace) | quote }}
  {{- end }}
  workshops:
  {{- range .Values.workshops }}
    - name: {{ .name }}
      expires: {{ .portal.expires }}
      orphaned: {{ .portal.orphaned }}
  {{- end }}

{{- end }}
