{{- if and .Values.enabled .Values.feedback.enabled }}
{{- $f := .Values.feedback }}
{{- $host := .Values.global.registry.host }}
{{- $img := $f.image.repository }}
{{- if $host }}{{ $img = printf "%s/%s" $host (regexReplaceAll "^[^/]+/" $f.image.repository "") }}{{ end }}
{{- $img = printf "%s:%s" $img (toString $f.image.tag) }}
{{- $fqdn := printf "%s.%s" $f.hostname .Values.ingressDomain }}
# =============================================================================
# Feedback collector — stores Likert ratings + comments (SQLite on a PV).
# See dcs-academy/planning/feedback-capture.md. TODO Remove?
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: feedback-collector
  labels:
    {{- include "workshops.labels" . | nindent 4 }}
    app.kubernetes.io/component: feedback
spec:
  accessModes: ["ReadWriteOnce"]
  {{- with $f.storage.className }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ $f.storage.size }}
---
{{- if $f.adminToken }}
apiVersion: v1
kind: Secret
metadata:
  name: feedback-collector-admin
  labels:
    {{- include "workshops.labels" . | nindent 4 }}
    app.kubernetes.io/component: feedback
type: Opaque
stringData:
  admin-token: {{ $f.adminToken | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feedback-collector
  labels:
    {{- include "workshops.labels" . | nindent 4 }}
    app.kubernetes.io/component: feedback
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 1
  strategy:
    # SQLite on a single RWO PV — never run two writers at once.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: feedback
  template:
    metadata:
      labels:
        {{- include "workshops.labels" . | nindent 8 }}
        app.kubernetes.io/component: feedback
    spec:
      containers:
        - name: feedback
          image: {{ $img | quote }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: FEEDBACK_DB
              value: /data/feedback.db
            - name: PRODUCT_NAME
              value: "DCS Academy"
            {{- if or $f.adminToken $f.existingSecret }}
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $f.existingSecret | default "feedback-collector-admin" }}
                  key: admin-token
            {{- end }}
            {{- with $f.databaseUrl }}
            - name: DATABASE_URL
              value: {{ . | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml $f.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: feedback-collector
---
apiVersion: v1
kind: Service
metadata:
  name: feedback-collector
  labels:
    {{- include "workshops.labels" . | nindent 4 }}
    app.kubernetes.io/component: feedback
spec:
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: feedback
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: feedback-collector
  labels:
    {{- include "workshops.labels" . | nindent 4 }}
    app.kubernetes.io/component: feedback
spec:
  host: {{ $fqdn }}
  to:
    kind: Service
    name: feedback-collector
  port:
    targetPort: http
  tls:
    termination: {{ $f.route.tls }}
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
