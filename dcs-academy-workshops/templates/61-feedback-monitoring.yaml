{{- if and .Values.enabled .Values.feedback.enabled .Values.feedback.serviceMonitor.enabled }}
# Scrape the feedback collector's /metrics via user-workload monitoring so the
# per-course rating/count metrics reach Thanos and the Grafana feedback board.
# (Requires enableUserWorkload: true in openshift-monitoring — same prerequisite
# as the platform's educates-metrics ServiceMonitor.)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: feedback-collector
  labels:
    {{- include "workshops.labels" . | nindent 4 }}
    app.kubernetes.io/component: feedback
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: feedback
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scheme: http
{{- end }}
