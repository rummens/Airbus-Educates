{{- if .Values.auth.enabled }}
{{- $authHost := include "workshops.portalHostname" . }}
{{- $portalNs := include "workshops.portalNamespace" . }}
{{- $secName := .Values.auth.existingSecret | default "educates-oauth-proxy" }}
# OpenShift OAuth gate for the portal. oauth-proxy (ServiceAccount-as-OAuthClient)
# serves the public portal host (training.<domain>) and proxies to the Educates
# portal Service; only cluster-authenticated (SSO) users get through. The portal
# trusts X-Forwarded-Host so its self-URLs use the proxy host. Educates' own
# portal route is blocked by the NetworkPolicy (50-portal-netpol.yaml).
{{- if and (not .Values.auth.existingSecret) (not .Values.auth.sealedSecret.enabled) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secName }}
{{- $cookie := "" }}
{{- if $existing }}
{{- $cookie = index $existing.data "cookie-secret" | b64dec }}
{{- else }}
{{- $cookie = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "workshops.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
stringData:
  cookie-secret: {{ $cookie | quote }}
---
{{- end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: educates-oauth-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "workshops.labels" . | nindent 4 }}
  annotations:
    serviceaccounts.openshift.io/oauth-redirecturi.primary: {{ printf "https://%s/oauth/callback" $authHost | quote }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: educates-oauth-proxy-auth-delegator
  labels:
    {{- include "workshops.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: educates-oauth-proxy
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: Service
metadata:
  name: educates-oauth-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "workshops.labels" . | nindent 4 }}
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: oauth-proxy-tls
spec:
  selector:
    app.kubernetes.io/component: oauth-proxy
  ports:
    - name: https
      port: 8443
      targetPort: 8443
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: educates-portal-oauth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "workshops.labels" . | nindent 4 }}
spec:
  host: {{ $authHost }}
  to:
    kind: Service
    name: educates-oauth-proxy
  port:
    targetPort: https
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: educates-oauth-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "workshops.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: oauth-proxy
  template:
    metadata:
      labels:
        {{- include "workshops.labels" . | nindent 8 }}
        app.kubernetes.io/component: oauth-proxy
    spec:
      serviceAccountName: educates-oauth-proxy
      {{- if .Values.global.registry.pullSecret }}
      imagePullSecrets:
        - name: {{ .Values.global.registry.pullSecret }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: oauth-proxy
          image: {{ include "workshops.oauthProxyImage" . | quote }}
          args:
            - --provider=openshift
            - --https-address=:8443
            - --http-address=
            - --upstream=http://training-portal.{{ $portalNs }}.svc:80
            - --openshift-service-account=educates-oauth-proxy
            - --cookie-secret-file=/etc/proxy/secrets/cookie-secret
            - --redirect-url=https://{{ $authHost }}/oauth/callback
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --email-domain=*
            - --pass-access-token
          ports:
            - name: https
              containerPort: 8443
          readinessProbe:
            httpGet:
              path: /oauth/healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /oauth/healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: proxy-secrets
              mountPath: /etc/proxy/secrets
              readOnly: true
            - name: proxy-tls
              mountPath: /etc/tls/private
              readOnly: true
      volumes:
        - name: proxy-secrets
          secret:
            secretName: {{ $secName }}
        - name: proxy-tls
          secret:
            secretName: oauth-proxy-tls
{{- end }}
