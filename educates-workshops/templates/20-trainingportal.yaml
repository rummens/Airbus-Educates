# Portal hosting every workshop in the catalog. Public UI is served at
# portal.ingress.hostname.<ingressDomain>; Educates-created namespaces use
# portal.name (dcst- prefix) so dynamic namespaces stay separate.
apiVersion: training.educates.dev/v1beta1
kind: TrainingPortal
metadata:
  name: {{ .Values.portal.name }}
  labels:
    {{- include "workshops.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  portal:
    title: {{ .Values.portal.title | quote }}
    {{- if and .Values.portal.ingress (not .Values.auth.enabled) }}
    # Non-auth setups: expose the portal directly at this host. With auth.enabled
    # the oauth-proxy owns portal.ingress.hostname instead and Educates keeps its
    # default <name>-ui host (blocked from direct access by the NetworkPolicy).
    ingress:
      hostname: {{ .Values.portal.ingress.hostname }}
    {{- end }}
    registration:
      type: {{ .Values.portal.registration.type }}
    updates:
      workshop: true
    sessions:
      maximum: {{ .Values.portal.sessions.maximum }}
    workshop:
      defaults:
        reserved: 1
        initial: 0
  workshops:
  {{- range .Values.workshops }}
    - name: {{ .name }}
      expires: {{ .portal.expires }}
      orphaned: {{ .portal.orphaned }}
  {{- end }}
