apiVersion: v2
name: educates-workshops
description: >-
  Educates workshop catalog — a TrainingPortal plus one Workshop CR per entry,
  driven entirely from values. Separate from the platform install
  (educates-openshift) so workshop content can be released independently.
  Ships lab-k8s-fundamentals sourced straight from its GitHub repo; add more by
  appending to the workshops list. Registry-overridable for air-gap.
type: application
version: 0.1.0
appVersion: "3.7.2"
keywords:
  - educates
  - workshops
  - openshift
home: https://educates.dev
sources:
  - https://github.com/educates/lab-k8s-fundamentals
maintainers:
  - name: Platform Enablement
