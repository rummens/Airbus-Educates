# Track CRD — pure catalog data the portal reads to group workshops into
# collapsible sections. Operator-free (no controller); cluster-scoped so one
# portal can present tracks spanning workshops. Rendered from values.tracks by
# templates/10-tracks.yaml.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tracks.academy.dcs
spec:
  group: academy.dcs
  scope: Cluster
  names:
    kind: Track
    listKind: TrackList
    plural: tracks
    singular: track
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [title]
              properties:
                title:       { type: string }
                description: { type: string }
                order:       { type: integer, default: 100 }
                icon:        { type: string, default: layers }
      additionalPrinterColumns:
        - name: Title
          type: string
          jsonPath: .spec.title
        - name: Order
          type: integer
          jsonPath: .spec.order
