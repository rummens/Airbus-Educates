{{- if and .Values.enabled .Values.rescan.token (not .Values.rescan.existingSecret) }}
# Shared token for the machine-triggered catalog rescan (POST /admin/rescan).
# The workshops chart's ArgoCD PostSync hook Job sends this same token. Set the
# identical value in that chart's `catalogRescan.token` (or point both at an
# existingSecret). Empty token → this Secret isn't created and token auth is off.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-rescan
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.rescan.token | quote }}
{{- end }}
