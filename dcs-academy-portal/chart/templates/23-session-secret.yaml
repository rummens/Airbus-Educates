{{- if and .Values.enabled .Values.auth.enabled (not .Values.auth.existingSecret) }}
{{- $secName := printf "%s-session" .Chart.Name }}
{{- if .Values.auth.sealedSecret.enabled }}
{{- if not .Values.auth.sealedSecret.encryptedSessionSecret }}
{{- fail "auth.sealedSecret.enabled=true requires auth.sealedSecret.encryptedSessionSecret (kubeseal --namespace <portal ns> ...)" }}
{{- end }}
# SealedSecret for the Flask session signing key (commit-safe). The controller
# unseals it to the Secret the deployment reads. Namespace-scoped — re-seal per ns.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ $secName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
spec:
  encryptedData:
    session-secret: {{ .Values.auth.sealedSecret.encryptedSessionSecret | quote }}
  template:
    metadata:
      name: {{ $secName }}
      namespace: {{ .Release.Namespace }}
    type: Opaque
{{- else }}
# Plain Secret for the Flask session signing key. Generated once and kept
# (resource-policy keep) so sessions survive re-syncs. NOTE: `helm template`
# (ArgoCD) has no cluster access → lookup returns empty → a fresh key each render,
# which logs everyone out on sync. For GitOps set auth.existingSecret or
# auth.sealedSecret. Plain generation is fine for `helm install` / dev.
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secName }}
{{- $sec := "" }}
{{- if $existing }}
{{- $sec = index $existing.data "session-secret" | b64dec }}
{{- else }}
{{- $sec = randAlphaNum 48 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  session-secret: {{ $sec | quote }}
{{- end }}
{{- end }}
