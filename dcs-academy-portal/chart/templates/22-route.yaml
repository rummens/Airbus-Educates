{{- if .Values.enabled }}
# The portal's public Route on the academy host (edge TLS). The portal serves the
# landing UI AND reverse-proxies the Educates session paths; login (OpenShift
# OAuth) runs inside the app, so there is no oauth-proxy in front. The VAP (62)
# reserves this host for this namespace so Educates' own portal Route can't win it.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
  annotations:
    # Session start (esp. with vcluster) can exceed the router's 30s default → 504.
    haproxy.router.openshift.io/timeout: {{ .Values.auth.routeTimeout | quote }}
    # route.openshift.io is an aggregated API (no CRD, no OpenAPI schema) — ArgoCD's
    # ServerSideApply structured-merge-diff can't resolve its parseableType. Opt this
    # resource out of SSA; falls back to normal diff for Route only.
    argocd.argoproj.io/sync-options: ServerSideApply=false
spec:
  host: {{ include "portal.authHostname" . }}
  to:
    kind: Service
    name: {{ .Chart.Name }}
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
