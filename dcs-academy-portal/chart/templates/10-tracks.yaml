{{- if .Values.enabled }}
# Track CRs rendered from values.tracks (GitOps-managed catalog grouping).
{{- range .Values.tracks }}
---
apiVersion: academy.dcs/v1alpha1
kind: Track
metadata:
  name: {{ .name }}
  labels:
    {{- include "portal.labels" $ | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  title: {{ .title | quote }}
  description: {{ .description | default "" | quote }}
  order: {{ .order | default 100 }}
  icon: {{ .icon | default "layers" | quote }}
{{- end }}
{{- end }}
