{{- if and .Values.enabled .Values.auth.enabled }}
{{- $authHost := include "portal.authHostname" . }}
{{- $secName := .Values.auth.existingSecret | default "oauth-proxy" }}
# OpenShift OAuth gate for this portal. oauth-proxy (ServiceAccount-as-OAuthClient)
# serves the academy host and proxies to this app's Service; only cluster-
# authenticated (SSO) users get through. The Educates operator still publishes its
# own portal Ingress/Route for the academy host, but the VAP (62-oauth-route-vap)
# reserves the host to this namespace so that bypass is denied.
{{- if and (not .Values.auth.existingSecret) (not .Values.auth.sealedSecret.enabled) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secName }}
{{- $cookie := "" }}
{{- if $existing }}
{{- $cookie = index $existing.data "cookie-secret" | b64dec }}
{{- else }}
{{- $cookie = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
stringData:
  cookie-secret: {{ $cookie | quote }}
---
{{- end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oauth-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
  annotations:
    serviceaccounts.openshift.io/oauth-redirecturi.primary: {{ printf "https://%s/oauth/callback" $authHost | quote }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Chart.Name }}-oauth-proxy-auth-delegator
  labels:
    {{- include "portal.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: oauth-proxy
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: Service
metadata:
  name: oauth-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: oauth-proxy-tls
spec:
  selector:
    app.kubernetes.io/component: oauth-proxy
  ports:
    - name: https
      port: 8443
      targetPort: 8443
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: oauth-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
  annotations:
    # Portal session-start (esp. with vcluster) can take longer than the router's
    # 30s default; raise the timeout so opening a still-provisioning workshop shows
    # progress instead of a 504.
    haproxy.router.openshift.io/timeout: {{ .Values.auth.routeTimeout | quote }}
spec:
  host: {{ $authHost }}
  to:
    kind: Service
    name: oauth-proxy
  port:
    targetPort: https
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth-proxy
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: oauth-proxy
  template:
    metadata:
      labels:
        {{- include "portal.labels" . | nindent 8 }}
        app.kubernetes.io/component: oauth-proxy
    spec:
      serviceAccountName: oauth-proxy
      {{- with .Values.global.registry.pullSecret }}
      imagePullSecrets:
        - name: {{ . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: oauth-proxy
          image: {{ include "portal.oauthProxyImage" . | quote }}
          args:
            - --provider=openshift
            - --https-address=:8443
            - --http-address=
            # Upstream = this chart's portal Service (the landing UI). It reverse-
            # proxies the Educates session paths back to the in-cluster backend, so
            # PORTAL_HOSTNAME=academy keeps working.
            - --upstream={{ .Values.auth.upstream | default (printf "http://%s.%s.svc:8080" .Chart.Name .Release.Namespace) }}
            - --openshift-service-account=oauth-proxy
            - --cookie-secret-file=/etc/proxy/secrets/cookie-secret
            - --redirect-url=https://{{ $authHost }}/oauth/callback
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --email-domain=*
            - --pass-access-token
            # Auto-redirect unauthenticated users straight to OpenShift OAuth
            # (like ArgoCD) instead of showing a skippable "Log in" page.
            - --skip-provider-button=true
          ports:
            - name: https
              containerPort: 8443
          readinessProbe:
            httpGet:
              path: /oauth/healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /oauth/healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: proxy-secrets
              mountPath: /etc/proxy/secrets
              readOnly: true
            - name: proxy-tls
              mountPath: /etc/tls/private
              readOnly: true
      volumes:
        - name: proxy-secrets
          secret:
            secretName: {{ $secName }}
        - name: proxy-tls
          secret:
            secretName: oauth-proxy-tls
{{- end }}
