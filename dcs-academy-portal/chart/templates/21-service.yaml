{{- if .Values.enabled }}
# The oauth-proxy's --upstream targets this Service (see 60-oauth-proxy.yaml). No
# Route here — the portal is only reached through the oauth-proxy on the academy
# host (in-cluster only otherwise).
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "portal.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: http
{{- end }}
