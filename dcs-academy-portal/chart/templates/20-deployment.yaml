{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "portal.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "portal.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Chart.Name }}
      {{- with .Values.global.registry.pullSecret }}
      imagePullSecrets:
        - name: {{ . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: portal
          image: {{ include "portal.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            # --- who we talk to ---
            - { name: EDUCATES_PORTAL_NAME,          value: {{ .Values.educates.portalName | quote }} }
            - { name: EDUCATES_PORTAL_CR_NAMESPACE,  value: {{ .Values.educates.portalCrNamespace | quote }} }
            - { name: EDUCATES_PORTAL_SERVICE_URL,   value: {{ .Values.educates.portalServiceUrl | quote }} }
            # --- behaviour ---
            - { name: PORTAL_SESSION_TLS_VERIFY,     value: {{ .Values.sessionTlsVerify | quote }} }
            - { name: FEEDBACK_MIN_REVIEWS,          value: {{ .Values.feedback.minReviews | quote }} }
            # --- login: portal IS the OpenShift OAuth client (no oauth-proxy) ---
            - { name: PORTAL_OAUTH_ENABLED,          value: {{ .Values.auth.enabled | quote }} }
            {{- if .Values.auth.enabled }}
            # SA-as-OAuthClient: client_id = system:serviceaccount:<ns>:<sa>; the
            # client_secret is the pod's projected SA token (read in-app at runtime).
            - { name: PORTAL_OAUTH_CLIENT_ID,        value: "system:serviceaccount:{{ .Release.Namespace }}:{{ .Chart.Name }}" }
            - { name: PORTAL_OAUTH_REDIRECT_URL,     value: "https://{{ include "portal.authHostname" . }}/oauth/callback" }
            - { name: PORTAL_OAUTH_SCOPE,            value: {{ .Values.auth.scope | quote }} }
            - { name: PORTAL_OAUTH_TLS_VERIFY,       value: {{ .Values.auth.oauthTlsVerify | quote }} }
            # Optional explicit endpoints (empty = discover from the in-cluster API).
            - { name: PORTAL_OAUTH_AUTHORIZE_URL,    value: {{ .Values.auth.authorizeUrl | quote }} }
            - { name: PORTAL_OAUTH_TOKEN_URL,        value: {{ .Values.auth.tokenUrl | quote }} }
            # Signed-session key (identity + token cookie). Keep stable across restarts.
            - name: PORTAL_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret | default (printf "%s-session" .Chart.Name) }}
                  key: session-secret
            {{- end }}
            - { name: ADMIN_SSAR_GROUP,              value: {{ .Values.admin.ssarGroup | quote }} }
            - { name: ADMIN_SSAR_RESOURCE,           value: {{ .Values.admin.ssarResource | quote }} }
            - { name: ADMIN_SSAR_VERB,               value: {{ .Values.admin.ssarVerb | quote }} }
            - { name: ADMIN_SSAR_NAMESPACE,          value: {{ .Values.admin.ssarNamespace | default .Values.educates.portalCrNamespace | quote }} }
            {{- if or .Values.rescan.token .Values.rescan.existingSecret }}
            # Shared token gating POST /admin/rescan (workshops chart PostSync hook).
            - name: PORTAL_RESCAN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rescan.existingSecret | default (printf "%s-rescan" .Chart.Name) }}
                  key: token
            {{- end }}
            {{- if .Values.feedback.cnpg.enabled }}
            # CNPG writes the connection URI into <cluster>-app (key "uri").
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "portal.cnpgName" . }}-app
                  key: uri
            {{- else }}
            - { name: FEEDBACK_DB, value: /tmp/feedback.db }
            {{- end }}
            {{- if and .Values.slides.enabled .Values.slides.git.repo }}
            # Slides served outside a session: the git-sync sidecar keeps the content
            # repo checked out at /slides-src/repo; slides.py serves each lab's
            # workshop/slides/ dir at /slides/<lab>/.
            - { name: PORTAL_SLIDES_ROOT, value: /slides-src/repo }
            {{- end }}
            {{- if (.Values.openssl.armcap | toString) }}
            # Skip OpenSSL's aarch64 CPU-capability probe (software crypto). Set on
            # Apple-Silicon CRC where the probe SIGILLs under Virtualization.framework.
            # toString so a numeric 0 still renders (a bare `with 0` is falsy).
            - { name: OPENSSL_armcap, value: {{ .Values.openssl.armcap | quote }} }
            {{- end }}
            # --- theme → CSS vars ---
            - { name: THEME_PRIMARY_COLOR,   value: {{ .Values.theme.primaryColor | quote }} }
            - { name: THEME_SECONDARY_COLOR, value: {{ .Values.theme.secondaryColor | quote }} }
            - { name: THEME_ACCENT_COLOR,    value: {{ .Values.theme.accentColor | quote }} }
            - { name: THEME_BACKGROUND,      value: {{ .Values.theme.background | quote }} }
            - { name: THEME_PRODUCT_NAME,    value: {{ .Values.theme.productName | quote }} }
            - { name: THEME_LOGO_URL,        value: {{ .Values.theme.logoUrl | quote }} }
            - { name: THEME_FAVICON,         value: {{ .Values.theme.favicon | quote }} }
            - { name: THEME_FONT_FAMILY,     value: {{ .Values.theme.fontFamily | quote }} }
            - { name: THEME_FOOTER_HTML,     value: {{ .Values.theme.footerHtml | quote }} }
            {{- if .Values.trustedCA.enabled }}
            # requests() trusts this bundle for outbound HTTPS (README fetch).
            - { name: REQUESTS_CA_BUNDLE, value: /etc/pki/portal-ca/ca-bundle.crt }
            {{- end }}
          {{- if or .Values.trustedCA.enabled (and .Values.slides.enabled .Values.slides.git.repo) }}
          volumeMounts:
            {{- if .Values.trustedCA.enabled }}
            - name: trusted-ca
              mountPath: /etc/pki/portal-ca
              readOnly: true
            {{- end }}
            {{- if and .Values.slides.enabled .Values.slides.git.repo }}
            - name: slides-src
              mountPath: /slides-src
              readOnly: true
            {{- end }}
          {{- end }}
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if and .Values.slides.enabled .Values.slides.git.repo }}
        # git-sync sidecar: keeps the workshop content repo checked out on a shared
        # volume and RE-PULLS every --period, so new/edited slides appear without a
        # pod restart. Air-gap: mirror the git-sync image to Harbor and point
        # slides.git.repo at the internal git host.
        - name: git-sync
          image: {{ .Values.slides.git.image | quote }}
          args:
            - --repo={{ .Values.slides.git.repo }}
            - --ref={{ .Values.slides.git.ref }}
            - --period={{ .Values.slides.git.period }}
            - --depth=1
            - --root=/slides-src
            - --link=repo
          {{- if or .Values.slides.git.existingSecret .Values.trustedCA.enabled }}
          env:
            {{- if .Values.slides.git.existingSecret }}
            - name: GITSYNC_USERNAME
              valueFrom: { secretKeyRef: { name: {{ .Values.slides.git.existingSecret }}, key: username } }
            - name: GITSYNC_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ .Values.slides.git.existingSecret }}, key: password } }
            {{- end }}
            {{- if .Values.trustedCA.enabled }}
            # Point git (used by git-sync to clone/fetch over HTTPS) at the merged
            # OpenShift trust bundle so it trusts the internal git host's private CA.
            - { name: GIT_SSL_CAINFO, value: /etc/pki/portal-ca/ca-bundle.crt }
            {{- end }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - name: slides-src
              mountPath: /slides-src
            {{- if .Values.trustedCA.enabled }}
            - name: trusted-ca
              mountPath: /etc/pki/portal-ca
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.slides.resources | nindent 12 }}
        {{- end }}
      {{- if or .Values.trustedCA.enabled (and .Values.slides.enabled .Values.slides.git.repo) }}
      volumes:
        {{- if .Values.trustedCA.enabled }}
        - name: trusted-ca
          configMap:
            name: {{ .Values.trustedCA.existingConfigMap | default (printf "%s-trusted-ca" .Chart.Name) }}
            items:
              - key: ca-bundle.crt
                path: ca-bundle.crt
        {{- end }}
        {{- if and .Values.slides.enabled .Values.slides.git.repo }}
        - name: slides-src
          emptyDir: {}
        {{- end }}
      {{- end }}
{{- end }}
