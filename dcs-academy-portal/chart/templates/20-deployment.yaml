{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "portal.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "portal.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Chart.Name }}
      {{- with .Values.global.registry.pullSecret }}
      imagePullSecrets:
        - name: {{ . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: portal
          image: {{ include "portal.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            # --- who we talk to ---
            - { name: EDUCATES_PORTAL_NAME,          value: {{ .Values.educates.portalName | quote }} }
            - { name: EDUCATES_PORTAL_CR_NAMESPACE,  value: {{ .Values.educates.portalCrNamespace | quote }} }
            - { name: EDUCATES_PORTAL_SERVICE_URL,   value: {{ .Values.educates.portalServiceUrl | quote }} }
            # --- behaviour ---
            - { name: PORTAL_SESSION_TLS_VERIFY,     value: {{ .Values.sessionTlsVerify | quote }} }
            - { name: FEEDBACK_MIN_REVIEWS,          value: {{ .Values.feedback.minReviews | quote }} }
            - { name: PORTAL_USER_HEADER,            value: {{ .Values.userHeader | quote }} }
            - { name: PORTAL_TOKEN_HEADER,           value: {{ .Values.tokenHeader | quote }} }
            - { name: ADMIN_SSAR_GROUP,              value: {{ .Values.admin.ssarGroup | quote }} }
            - { name: ADMIN_SSAR_RESOURCE,           value: {{ .Values.admin.ssarResource | quote }} }
            - { name: ADMIN_SSAR_VERB,               value: {{ .Values.admin.ssarVerb | quote }} }
            - { name: ADMIN_SSAR_NAMESPACE,          value: {{ .Values.admin.ssarNamespace | default .Values.educates.portalCrNamespace | quote }} }
            {{- if .Values.feedback.cnpg.enabled }}
            # CNPG writes the connection URI into <cluster>-app (key "uri").
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "portal.cnpgName" . }}-app
                  key: uri
            {{- else }}
            - { name: FEEDBACK_DB, value: /tmp/feedback.db }
            {{- end }}
            # --- theme → CSS vars ---
            - { name: THEME_PRIMARY_COLOR,   value: {{ .Values.theme.primaryColor | quote }} }
            - { name: THEME_SECONDARY_COLOR, value: {{ .Values.theme.secondaryColor | quote }} }
            - { name: THEME_ACCENT_COLOR,    value: {{ .Values.theme.accentColor | quote }} }
            - { name: THEME_BACKGROUND,      value: {{ .Values.theme.background | quote }} }
            - { name: THEME_PRODUCT_NAME,    value: {{ .Values.theme.productName | quote }} }
            - { name: THEME_LOGO_URL,        value: {{ .Values.theme.logoUrl | quote }} }
            - { name: THEME_FAVICON,         value: {{ .Values.theme.favicon | quote }} }
            - { name: THEME_FONT_FAMILY,     value: {{ .Values.theme.fontFamily | quote }} }
            - { name: THEME_FOOTER_HTML,     value: {{ .Values.theme.footerHtml | quote }} }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
