{{- if and .Values.enabled .Values.auth.enabled .Values.auth.sealedSecret.enabled }}
{{- if not .Values.auth.sealedSecret.encryptedCookieSecret }}
{{- fail "auth.sealedSecret.enabled=true requires auth.sealedSecret.encryptedCookieSecret (re-seal for this namespace: kubeseal --namespace <portal ns> ...)" }}
{{- end }}
# SealedSecret for the oauth-proxy cookie secret. Encrypted value is commit-safe;
# the sealed-secrets controller unseals it to a Secret named oauth-proxy that
# 60-oauth-proxy.yaml mounts. SealedSecrets are namespace-scoped — re-seal for
# this chart's namespace. Requires the bitnami sealed-secrets controller.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: oauth-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
spec:
  encryptedData:
    cookie-secret: {{ .Values.auth.sealedSecret.encryptedCookieSecret | quote }}
  template:
    metadata:
      name: oauth-proxy
      namespace: {{ .Release.Namespace }}
    type: Opaque
{{- end }}
