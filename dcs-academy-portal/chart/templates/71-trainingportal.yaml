{{- if .Values.enabled }}
# TrainingPortal hosting every workshop in the catalog (70). Cluster-scoped; the
# VAP (62, sync-wave -1) is applied first so it reserves the academy host before
# Educates auto-publishes its own portal Route for it.
#
# portal.ingress.hostname = the PUBLIC academy host (auth.hostname). Educates uses
# it for PORTAL_HOSTNAME → the URLs, session cookies, and CSP frame-ancestors it
# generates, so the session dashboard's cross-origin iframes work when served
# through the oauth-proxy. The proxy (60) claims this host and the VAP denies
# Educates' own auto-route for it — the proxy is the only entry (SSO-gated).
apiVersion: training.educates.dev/v1beta1
kind: TrainingPortal
metadata:
  name: {{ .Values.educates.portalName }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  portal:
    title: {{ .Values.portal.title | quote }}
    ingress:
      hostname: {{ .Values.auth.hostname }}
    registration:
      type: {{ .Values.portal.registration.type }}
    updates:
      workshop: true
    sessions:
      maximum: {{ .Values.portal.sessions.maximum }}
    workshop:
      defaults:
        reserved: 1
        initial: 0
  # One-click Likert ratings on the feedback page fire report-analytics-event;
  # Educates POSTs every analytics event to this webhook → this app's /analytics
  # (CNPG-backed). Override with feedback.analyticsWebhookUrl.
  analytics:
    webhook:
      url: {{ .Values.feedback.analyticsWebhookUrl | default (printf "http://%s.%s.svc:8080/analytics" .Chart.Name .Release.Namespace) | quote }}
  workshops:
  {{- range .Values.workshops }}
    - name: {{ .name }}
      expires: {{ .portal.expires }}
      orphaned: {{ .portal.orphaned }}
  {{- end }}
{{- end }}
