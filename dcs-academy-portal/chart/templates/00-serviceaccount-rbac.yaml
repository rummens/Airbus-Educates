{{- if .Values.enabled }}
# App ServiceAccount: read-only on the catalog + session CRs and session pods.
# SSAR (admin check) uses the *user's* token, not this SA — so no authz perms
# are granted here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Chart.Name }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
rules:
  - apiGroups: ["training.educates.dev"]
    resources: ["workshops", "trainingportals", "workshopsessions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["academy.dcs"]
    resources: ["tracks"]
    verbs: ["get", "list", "watch"]
  # Provisioning feed: workshop + vcluster session pods (all namespaces; the
  # session/vc namespaces are dynamic). Read-only.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Chart.Name }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Chart.Name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Chart.Name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
