{{- if and .Values.enabled .Values.auth.enabled }}
# Fail-closed backstop for the SSO gate: reserve the academy host at the API
# level so ONLY the oauth-proxy Route (this namespace) may claim it. Without
# this, deleting/recreating the proxy Route lets the Educates auto-published
# portal Route (in the <portalName>-ui namespace) win the host and serve the
# backend UNAUTHENTICATED (router admission is oldest-claim-wins). With it, that
# Route is denied at creation — the ingress-to-route controller just retries and
# logs warning events; the backend itself is unaffected.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: reserve-academy-host
  labels:
    {{- include "portal.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["route.openshift.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["routes"]
  validations:
    - expression: >-
        object.metadata.namespace == '{{ .Release.Namespace }}' ||
        !has(object.spec.host) ||
        object.spec.host != '{{ include "portal.authHostname" . }}'
      message: >-
        Host {{ include "portal.authHostname" . }} is reserved for the
        oauth-proxy route in {{ .Release.Namespace }} (SSO gate, fail-closed
        backstop).
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: reserve-academy-host
  labels:
    {{- include "portal.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  policyName: reserve-academy-host
  validationActions: ["Deny"]
{{- end }}
