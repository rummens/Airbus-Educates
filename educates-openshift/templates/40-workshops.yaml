# Workshop definitions. Requires the training.educates.dev CRDs installed by the
# installer App first — if applied in one shot before the platform is ready, this
# will error; simply re-apply (idempotent). See README verify steps.
# Skipped entirely when portal.enabled=false (use the educates-workshops chart).
{{- if .Values.portal.enabled }}
{{- $ctx := . -}}
{{- range .Values.workshops }}
---
apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: {{ .name }}
  labels:
    {{- include "educates.labels" $ctx | nindent 4 }}
  annotations:
    # Applied after the platform (wave 5). CRDs are created asynchronously by the
    # installer App, so tell ArgoCD not to hard-fail dry-run before they exist —
    # it retries until the CRD lands. No-op for plain `oc apply`.
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  title: {{ .title | quote }}
  description: {{ .description | quote }}
  workshop:
    files:
      - image:
          url: {{ include "educates.workshopImage" (dict "ctx" $ctx "ws" .) | quote }}
        includePaths:
          - /workshop/**
          - /templates/**
          - /README.md
  session:
    namespaces:
      budget: {{ include "educates.sessionBudget" (dict "ctx" $ctx "ws" .) }}
      security:
        policy: {{ include "educates.sessionPolicy" (dict "ctx" $ctx "ws" .) }}
    applications:
      terminal:
        enabled: true
        layout: split
      console:
        enabled: true
      editor:
        enabled: true
      slides:
        enabled: true
      {{- if $ctx.Values.vcluster.enabled }}
      # Phase 3: per-session virtual cluster. vcluster images ship inside the
      # installer bundle and are registry-overridable via bundle relocation.
      vcluster:
        enabled: true
      {{- end }}
{{- end }}
{{- end }}
