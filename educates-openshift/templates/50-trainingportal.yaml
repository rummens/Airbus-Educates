# Training portal hosting the workshops above. Served by Educates at
# <portal.name>-ui.<ingressDomain> via an Ingress the OpenShift Router picks up.
# Skipped when portal.enabled=false (use the educates-workshops chart instead).
{{- if .Values.portal.enabled }}
apiVersion: training.educates.dev/v1beta1
kind: TrainingPortal
metadata:
  name: {{ .Values.portal.name }}
  labels:
    {{- include "educates.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  portal:
    title: {{ .Values.portal.title | quote }}
    registration:
      # anonymous in phase 1 (and when OAuth fronts the portal in phase 2, since
      # the proxy authenticates first). one-step uses Educates' native login form.
      type: {{ if .Values.portal.registration.enabled }}anonymous{{ else }}one-step{{ end }}
    updates:
      workshop: true
    sessions:
      maximum: {{ .Values.portal.sessions.maximum }}
    workshop:
      defaults:
        reserved: 1
        initial: 0
  workshops:
  {{- range .Values.workshops }}
    - name: {{ .name }}
      expires: {{ .expires }}
      orphaned: {{ .orphaned }}
  {{- end }}
{{- end }}
