{{- if and .Values.auth.enabled .Values.auth.sealedSecret.enabled }}
{{- if not .Values.auth.sealedSecret.encryptedCookieSecret }}
{{- fail "auth.sealedSecret.enabled=true requires auth.sealedSecret.encryptedCookieSecret (see values.yaml for the kubeseal command)" }}
{{- end }}
# SealedSecret for the oauth-proxy cookie secret. The encrypted value is safe to
# commit; the sealed-secrets controller decrypts it into a Secret named
# educates-oauth-proxy that 70-auth.yaml's Deployment mounts. Requires the
# bitnami sealed-secrets controller in the cluster.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: educates-oauth-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "educates.labels" . | nindent 4 }}
spec:
  encryptedData:
    cookie-secret: {{ .Values.auth.sealedSecret.encryptedCookieSecret | quote }}
  template:
    metadata:
      name: educates-oauth-proxy
      namespace: {{ .Release.Namespace }}
    type: Opaque
{{- end }}
