{{- if and .Values.portal.enabled .Values.portal.route.enabled (not .Values.auth.enabled) }}
# Optional explicit Route to the portal. OFF by default because Educates already
# creates an Ingress the OpenShift Router serves at the same host — enabling both
# on the same host conflicts. Use this only if you disable the auto Ingress or
# want explicit TLS control. Lives in the Educates-managed portal namespace.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.portal.name }}-portal
  namespace: {{ .Values.portal.name }}-ui
  labels:
    {{- include "educates.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  host: {{ include "educates.portalHostname" . }}
  to:
    kind: Service
    name: training-portal
  port:
    targetPort: 8080
  tls:
    termination: {{ .Values.portal.route.tls }}
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
