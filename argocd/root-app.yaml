apiVersion: argoproj.io/v1beta1
kind: Application
metadata:
  name: educates-root
  namespace: openshift-gitops
spec:
  project: default
  # App-of-apps: manages the three child Applications under argocd/apps.
  # Their own sync-wave annotations order the actual rollout.
  source:
    repoURL: https://github.com/rummens/Airbus-Educates
    targetRevision: main
    path: argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
