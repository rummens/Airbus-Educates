# Per-cluster values for the educates-workshops chart (x86 test cluster).
# Referenced by the educates-workshops ArgoCD Application (multi-source valueFiles).
ingressDomain: apps.test.ocp.globomantics.com
# OpenShift OAuth gate in front of the portal (SSO). Cookie secret supplied
# out-of-band (pre-created secret or SealedSecret); never plaintext in git.
auth:
  enabled: true
  existingSecret: educates-oauth-proxy
  tlsCertificateRef:
    name: globomantics-ingress-cert
    namespace: openshift-ingress
# Phase 3: per-session vcluster.
vcluster:
  enabled: true
