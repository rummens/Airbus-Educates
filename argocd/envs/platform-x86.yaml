# Per-cluster values for the educates-openshift (platform) chart.
# Referenced by the educates-platform ArgoCD Application (multi-source valueFiles).
# Copy this per cluster; only ingressDomain + tlsCertificateRef differ.
# Platform is install-only now (portal/workshops/auth live in educates-workshops).
educates:
  # x86 test cluster wildcard domain.
  ingressDomain: apps.test.ocp.globomantics.com
  ingress:
    protocol: https
    # Router's serving cert on this cluster (edge termination).
    tlsCertificateRef:
      name: globomantics-ingress-cert
      namespace: openshift-ingress
