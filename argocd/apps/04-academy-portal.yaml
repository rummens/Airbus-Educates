apiVersion: argoproj.io/v1beta1
kind: Application
metadata:
  name: dcs-academy-portal
  namespace: openshift-gitops
  annotations:
    # After the platform (wave 1): needs the Educates Workshop/TrainingPortal CRDs
    # + the CNPG operator. This one chart owns the whole academy: catalog,
    # TrainingPortal, oauth gate, custom UI, feedback. Ordering is handled INSIDE
    # the chart by resource sync-waves (VAP -1 → app 3 → netpol 4 → CRs 5), so the
    # host-reservation VAP is admitted before the TrainingPortal triggers Educates'
    # auto-route. The Track CRD ships in crds/; the CNPG Cluster, Workshop/
    # TrainingPortal CRs, and -ui netpol carry SkipDryRunOnMissingResource so
    # ArgoCD retries until their deps exist instead of hard-failing.
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/rummens/Airbus-Educates
      targetRevision: main
      path: dcs-academy-portal/chart
      helm:
        valueFiles:
          - $values/argocd/envs/platform-crc.yaml
    - repoURL: https://github.com/rummens/Airbus-Educates
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: dcs-academy-portal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 20
      backoff:
        duration: 15s
        maxDuration: 5m
        factor: 2
