apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dcs-academy-workshops
  namespace: openshift-gitops
  annotations:
    # Last: needs the training.educates.dev CRDs the platform installs (wave 1)
    # AND the academy-host VAP + oauth-proxy from the portal app (wave 2) in place
    # before the TrainingPortal triggers Educates' auto-route (fail-closed gate).
    # The Workshop/TrainingPortal CRs carry SkipDryRunOnMissingResource so ArgoCD
    # retries until those CRDs exist instead of hard-failing.
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # Per-cluster settings (ingressDomain, auth cert, auth/vcluster toggles) are
  # chart defaults now. Override per cluster via spec.source.helm.valuesObject.
  sources:
    - repoURL: https://github.com/rummens/Airbus-Educates
      targetRevision: main
      path: dcs-academy-workshops
      helm:
        valueFiles:
          - $values/argocd/envs/platform-crc.yaml
    - repoURL: https://github.com/rummens/Airbus-Educates
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    # Static release ns for the portal/workshop CRs + oauth-proxy (dcs-).
    # Dynamic per-session namespaces are dcst-* (from the portal name).
    namespace: dcs-educates-workshops
  # Educates' Workshop CRD defaults spec.workshop.files[].path to "." on the
  # stored object; git doesn't set it, so ArgoCD reports OutOfSync. Ignore it.
  ignoreDifferences:
    - group: training.educates.dev
      kind: Workshop
      jqPathExpressions:
        - '.spec.workshop.files[].path'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 20
      backoff:
        duration: 15s
        maxDuration: 5m
        factor: 2
