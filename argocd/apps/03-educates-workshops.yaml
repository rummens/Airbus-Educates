apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: educates-workshops
  namespace: openshift-gitops
  annotations:
    # Last: needs the training.educates.dev CRDs the platform installs. The
    # Workshop/TrainingPortal CRs carry SkipDryRunOnMissingResource so ArgoCD
    # retries until those CRDs exist instead of hard-failing.
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # Multi-source: chart + per-cluster values (domain, auth cert, vcluster).
  # Point valueFiles at the env file for THIS cluster.
  sources:
    - repoURL: https://github.com/rummens/Airbus-Educates
      targetRevision: main
      path: educates-workshops
      helm:
        valueFiles:
          - $values/argocd/envs/workshops-x86.yaml
    - repoURL: https://github.com/rummens/Airbus-Educates
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    # Static release ns for the portal/workshop CRs + oauth-proxy (dcs- = platform).
    # Dynamic per-session namespaces are dcst-* (from the portal name).
    namespace: dcs-educates-workshops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 20
      backoff:
        duration: 15s
        maxDuration: 5m
        factor: 2
