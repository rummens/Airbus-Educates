apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: educates-workshops
  namespace: openshift-gitops
  annotations:
    # Last: needs the training.educates.dev CRDs the platform installs. The
    # Workshop/TrainingPortal CRs carry SkipDryRunOnMissingResource so ArgoCD
    # retries until those CRDs exist instead of hard-failing.
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rummens/Airbus-Educates
    targetRevision: main
    path: educates-workshops
    helm:
      valuesObject:
        # Phase 3: per-session vcluster on every workshop.
        vcluster:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: educates
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 20
      backoff:
        duration: 15s
        maxDuration: 5m
        factor: 2
