apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: educates-platform
  namespace: openshift-gitops
  annotations:
    # After kapp-controller. On delete, removed before kapp-controller so the
    # installer App's finalizer can run its cleanup while kapp-controller lives.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # Multi-source: the chart + a per-cluster values file. Point valueFiles at the
  # env file for THIS cluster (platform-x86.yaml / platform-crc.yaml). This is the
  # only place ingressDomain + cert are set — no hardcoding in the chart.
  sources:
    - repoURL: https://github.com/rummens/Airbus-Educates
      targetRevision: main
      path: educates-openshift
      helm:
        valueFiles:
          - $values/argocd/envs/platform-x86.yaml
    - repoURL: https://github.com/rummens/Airbus-Educates
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    # Release namespace — oauth-proxy (phase 2) lands here. Installer creates its
    # own educates-installer / educates namespaces regardless.
    namespace: educates
  # kapp-controller co-owns fields on the installer App + its tracking ConfigMap.
  # Ignore those managers so ArgoCD does not fight kapp-controller (no SSA churn).
  ignoreDifferences:
    - group: kappctrl.k14s.io
      kind: App
      managedFieldsManagers:
        - kapp-controller
    - group: ""
      kind: ConfigMap
      name: installer.educates.dev.app
      namespace: educates-installer
      managedFieldsManagers:
        - kapp
        - kapp-controller
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 15
      backoff:
        duration: 15s
        maxDuration: 5m
        factor: 2
