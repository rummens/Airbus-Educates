apiVersion: argoproj.io/v1beta1
kind: Application
metadata:
  name: dcs-academy-platform
  namespace: openshift-gitops
  annotations:
    # After kapp-controller. On delete, removed before kapp-controller so the
    # installer App's finalizer can run its cleanup while kapp-controller lives.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # Per-cluster settings (ingressDomain, router cert) are chart defaults now.
  # Override per cluster via spec.source.helm.valuesObject if needed.
  sources:
    - repoURL: https://github.com/rummens/Airbus-Educates
      targetRevision: main
      path: dcs-academy-platform
      helm:
        valueFiles:
          - $values/argocd/envs/platform-crc.yaml
    - repoURL: https://github.com/rummens/Airbus-Educates
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    # Static platform release namespace (dcs-). Holds the helm release + monitoring
    # resources. The installer creates its own dcs-educates-installer namespace.
    namespace: dcs-educates
  # kapp-controller co-owns fields on the installer App + its tracking ConfigMap.
  # Ignore those managers so ArgoCD does not fight kapp-controller (no SSA churn).
  ignoreDifferences:
    - group: kappctrl.k14s.io
      kind: App
      managedFieldsManagers:
        - kapp-controller
    - group: ""
      kind: ConfigMap
      name: installer.educates.dev.app
      namespace: dcs-educates-installer
      managedFieldsManagers:
        - kapp
        - kapp-controller
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 15
      backoff:
        duration: 15s
        maxDuration: 5m
        factor: 2
