{{- if and .Values.enabled .Values.bundleMirror.enabled }}
{{- if not .Values.global.registry.host }}
{{- fail "bundleMirror.enabled=true requires global.registry.host (the destination registry, e.g. registry.example/dcs-internal-images)" }}
{{- end }}
{{- $ns := .Values.educates.installer.namespace }}
{{- /* SRC = upstream ghcr bundle (never host-swapped). DEST repo = host-swapped
       path, no tag (imgpkg keeps the tag). DEST host = first path segment only. */ -}}
{{- $srcRepo := .Values.educates.installer.bundleRepository }}
{{- $path := regexReplaceAll "^[^/]+/" $srcRepo "" }}
{{- $destRepo := printf "%s/%s" .Values.global.registry.host $path }}
{{- $destHost := (splitList "/" .Values.global.registry.host) | first }}
{{- $caName := "educates-bundle-mirror-ca-bundle" }}
{{- $caFile := "/etc/pki/injected-ca/ca-bundle.crt" }}
{{- $extra := "" }}
{{- if .Values.bundleMirror.insecureSkipTLSVerify }}{{- $extra = "--registry-verify-certs=false" }}{{- end }}
{{- if .Values.bundleMirror.trustClusterCABundle }}
# OpenShift trusted-CA ConfigMap for the mirror Job. The Cluster Network Operator
# fills ca-bundle.crt with the system CAs + any custom cluster CA (Proxy .spec
# .trustedCA), and the Job points Go/imgpkg at it via SSL_CERT_FILE so TLS to a
# private registry OR proxy validates. Normal resource (synced before the PostSync
# Job), so keep bundleMirror.hook=PostSync or the bundle won't be populated in time.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $caName }}
  namespace: {{ $ns }}
  labels:
    config.openshift.io/inject-trusted-cabundle: "true"
    {{- include "educates.labels" . | nindent 4 }}
---
{{- end }}
# Relocates the Educates installer imgpkg bundle into your registry as an ArgoCD
# sync-hook Job. Idempotent (imgpkg copy skips existing blobs). See bundleMirror in
# values.yaml. Runs FROM INSIDE the cluster so no workstation imgpkg is needed.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: educates-bundle-mirror
  namespace: {{ $ns }}
  labels:
    {{- include "educates.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: educates-bundle-mirror
  namespace: {{ $ns }}
  labels:
    {{- include "educates.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: educates-bundle-mirror
  namespace: {{ $ns }}
  labels:
    {{- include "educates.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: educates-bundle-mirror
subjects:
  - kind: ServiceAccount
    name: educates-bundle-mirror
    namespace: {{ $ns }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: educates-bundle-mirror
  namespace: {{ $ns }}
  labels:
    {{- include "educates.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: {{ .Values.bundleMirror.hook | quote }}
    # Re-run on each sync; clean up the previous Job first (idempotent copy).
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: {{ .Values.bundleMirror.backoffLimit }}
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      labels:
        {{- include "educates.labels" . | nindent 8 }}
    spec:
      serviceAccountName: educates-bundle-mirror
      automountServiceAccountToken: false
      restartPolicy: Never
      {{- if .Values.global.registry.pullSecret }}
      imagePullSecrets:
        - name: {{ .Values.global.registry.pullSecret }}
      {{- end }}
      containers:
        - name: mirror
          image: {{ include "educates.mirrorImage" . | quote }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
            readOnlyRootFilesystem: true
          env:
            - name: SRC_BUNDLE
              value: {{ printf "%s:%s" $srcRepo .Values.educates.version | quote }}
            - name: DEST_REPO
              value: {{ $destRepo | quote }}
            # Writable scratch (rootfs is read-only) — imgpkg needs TMP + HOME to write.
            - name: HOME
              value: /tmp
            - name: TMPDIR
              value: /tmp
            {{- if .Values.bundleMirror.registryCredsSecret }}
            # Push creds for the destination host (imgpkg matches by hostname), index 0.
            - name: IMGPKG_REGISTRY_HOSTNAME_0
              value: {{ $destHost | quote }}
            - name: IMGPKG_REGISTRY_USERNAME_0
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bundleMirror.registryCredsSecret | quote }}
                  key: username
            - name: IMGPKG_REGISTRY_PASSWORD_0
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bundleMirror.registryCredsSecret | quote }}
                  key: password
            {{- end }}
            {{- if .Values.bundleMirror.dockerHubCredsSecret }}
            # Docker Hub creds (index 1) — authenticates docker.io pulls in the bundle
            # so they don't hit the anonymous rate limit. imgpkg reads _1 only if _0 is
            # present, so keep the push creds above set.
            - name: IMGPKG_REGISTRY_HOSTNAME_1
              value: "index.docker.io"
            - name: IMGPKG_REGISTRY_USERNAME_1
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bundleMirror.dockerHubCredsSecret | quote }}
                  key: username
            - name: IMGPKG_REGISTRY_PASSWORD_1
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bundleMirror.dockerHubCredsSecret | quote }}
                  key: password
            {{- end }}
            {{- if $extra }}
            - name: IMGPKG_EXTRA_ARGS
              value: {{ $extra | quote }}
            {{- end }}
            {{- if .Values.bundleMirror.trustClusterCABundle }}
            # Go/imgpkg honor SSL_CERT_FILE; the injected bundle is a superset of the
            # system CAs, so public (ghcr) + private (registry/proxy) TLS both validate.
            - name: SSL_CERT_FILE
              value: {{ $caFile | quote }}
            {{- end }}
            {{- with .Values.bundleMirror.proxy }}
            {{- if .httpsProxy }}
            - { name: HTTPS_PROXY, value: {{ .httpsProxy | quote }} }
            - { name: https_proxy, value: {{ .httpsProxy | quote }} }
            {{- end }}
            {{- if .httpProxy }}
            - { name: HTTP_PROXY, value: {{ .httpProxy | quote }} }
            - { name: http_proxy, value: {{ .httpProxy | quote }} }
            {{- end }}
            {{- if .noProxy }}
            - { name: NO_PROXY, value: {{ .noProxy | quote }} }
            - { name: no_proxy, value: {{ .noProxy | quote }} }
            {{- end }}
            {{- end }}
          volumeMounts:
            # Read-only rootfs → imgpkg's scratch/temp + HOME live on this emptyDir.
            - name: scratch
              mountPath: /tmp
            {{- if .Values.bundleMirror.trustClusterCABundle }}
            - name: injected-ca
              mountPath: /etc/pki/injected-ca
              readOnly: true
            {{- end }}
          resources:
            requests:
              cpu: 100m
              memory: {{ .Values.bundleMirror.resources.requests.memory | default "2Gi" }}
              ephemeral-storage: {{ .Values.bundleMirror.resources.requests.ephemeralStorage | default "20Gi" }}
            limits:
              cpu: 500m
              memory: {{ .Values.bundleMirror.resources.limits.memory | default "4Gi" }}
              ephemeral-storage: {{ .Values.bundleMirror.resources.limits.ephemeralStorage | default "25Gi" }}
      volumes:
        - name: scratch
          emptyDir:
            sizeLimit: {{ .Values.bundleMirror.resources.limits.ephemeralStorage | default "25Gi" }}
        {{- if .Values.bundleMirror.trustClusterCABundle }}
        - name: injected-ca
          configMap:
            name: {{ $caName }}
            items:
              - key: ca-bundle.crt
                path: ca-bundle.crt
        {{- end }}
{{- end }}
