{{- if and .Values.enabled .Values.bundleMirror.enabled }}
{{- $ns := .Values.educates.installer.namespace }}
{{- $bm := .Values.bundleMirror }}
{{- /* Collect the creds sets that were supplied as sealed values. Each renders one
       SealedSecret; the controller unseals it into a Secret with keys username +
       password that the mirror Job mounts (push creds → _0, Docker Hub → _1). The
       encryptedData comes from `kubeseal --raw` (safe to commit). */ -}}
{{- $sets := list }}
{{- with $bm.sealedRegistryCredentials }}
{{- if and .username .password }}
{{- if not $bm.registryCredsSecret }}{{- fail "bundleMirror.sealedRegistryCredentials requires bundleMirror.registryCredsSecret (the target Secret name the values were sealed against)" }}{{- end }}
{{- $sets = append $sets (dict "name" $bm.registryCredsSecret "u" .username "p" .password) }}
{{- end }}
{{- end }}
{{- with $bm.sealedDockerHubCredentials }}
{{- if and .username .password }}
{{- if not $bm.dockerHubCredsSecret }}{{- fail "bundleMirror.sealedDockerHubCredentials requires bundleMirror.dockerHubCredsSecret (the target Secret name the values were sealed against)" }}{{- end }}
{{- $sets = append $sets (dict "name" $bm.dockerHubCredsSecret "u" .username "p" .password) }}
{{- end }}
{{- end }}
{{- range $sets }}
---
# Creds for the bundle-mirror Job, delivered as a SealedSecret (encryptedData from
# `kubeseal --raw`, committed to git; only this cluster's sealed-secrets controller
# can decrypt it). Unseals into Secret "{{ .name }}" (keys username/password).
# kubeseal scope MUST match name={{ .name }} + namespace={{ $ns }}.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .name }}
  namespace: {{ $ns }}
  labels:
    {{- include "educates.labels" $ | nindent 4 }}
spec:
  encryptedData:
    username: {{ .u | quote }}
    password: {{ .p | quote }}
  template:
    metadata:
      name: {{ .name }}
      namespace: {{ $ns }}
    type: Opaque
{{- end }}
{{- end }}
