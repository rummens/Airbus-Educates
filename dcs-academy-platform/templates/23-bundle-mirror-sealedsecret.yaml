{{- if and .Values.enabled .Values.bundleMirror.enabled }}
{{- $sc := .Values.bundleMirror.sealedRegistryCredentials }}
{{- if and $sc $sc.username $sc.password }}
{{- if not .Values.bundleMirror.registryCredsSecret }}
{{- fail "bundleMirror.sealedRegistryCredentials requires bundleMirror.registryCredsSecret (the target Secret name the values were sealed against)" }}
{{- end }}
# Registry PUSH creds for the bundle-mirror Job, delivered as a SealedSecret. The
# encryptedData values come from `kubeseal --raw` (committed to git; only this
# cluster's sealed-secrets controller can decrypt them). The controller unseals this
# into a Secret named {{ .Values.bundleMirror.registryCredsSecret }} with keys
# username/password, which 22-bundle-mirror-job.yaml mounts. Seal scope MUST match
# this name + namespace (kubeseal default strict scope), else decryption fails.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.bundleMirror.registryCredsSecret }}
  namespace: {{ .Values.educates.installer.namespace }}
  labels:
    {{- include "educates.labels" . | nindent 4 }}
spec:
  encryptedData:
    username: {{ $sc.username | quote }}
    password: {{ $sc.password | quote }}
  template:
    metadata:
      name: {{ .Values.bundleMirror.registryCredsSecret }}
      namespace: {{ .Values.educates.installer.namespace }}
    type: Opaque
{{- end }}
{{- end }}
