{{- if .Values.enabled }}
# Educates installer configuration. Consumed by the App CR via valuesFrom.
# This is the config.yaml the upstream docs tell you to hand to the installer,
# built entirely from chart values. No secrets are placed here — portal admin
# credentials are auto-generated by Educates.
apiVersion: v1
kind: Secret
metadata:
  name: educates-installer
  namespace: {{ .Values.educates.installer.namespace }}
  labels:
    {{- include "educates.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
stringData:
  config.yaml: |
    clusterInfrastructure:
      provider: {{ .Values.educates.provider }}
    clusterIngress:
      domain: {{ .Values.educates.ingressDomain }}
      {{- with .Values.educates.ingress }}
      protocol: {{ .protocol }}
      {{- if and (eq .protocol "https") .tlsCertificateRef.name }}
      tlsCertificateRef:
        name: {{ .tlsCertificateRef.name | quote }}
        namespace: {{ .tlsCertificateRef.namespace | quote }}
      {{- end }}
      {{- end }}
    clusterSecurity:
      policyEngine: {{ .Values.educates.security.policyEngine }}
    workshopSecurity:
      rulesEngine: {{ .Values.educates.security.rulesEngine }}
    clusterPackages:
      # OpenShift Router provides ingress; Educates must not install Contour.
      contour:
        enabled: false
      # OpenShift uses SCCs, not Kyverno.
      kyverno:
        enabled: false
    version: {{ .Values.educates.version | quote }}
    {{- if .Values.global.registry.host }}
    # Air-gap: point Educates' own image registry at the mirror so its components
    # pull educates-<component>:<version> from there.
    imageRegistry:
      host: {{ .Values.global.registry.host | quote }}
      namespace: {{ .Values.educates.imageRegistry.namespace | quote }}
    {{- if .Values.global.registry.pullSecret }}
    clusterSecrets:
      pullSecretRefs:
        - namespace: {{ .Values.educates.installer.namespace }}
          name: {{ .Values.global.registry.pullSecret }}
    {{- end }}
    {{- end }}
    {{- if .Values.educates.theming.enabled }}
    {{- $t := .Values.educates.theming }}
    # UI theming stub. Injects brand colors (as CSS custom properties) + an
    # optional logo into the portal and workshop dashboard. The exact CSS
    # selectors depend on the Educates version — treat this as a starting point.
    websiteStyling:
      trainingPortal:
        style: |
          :root {
            --primary-color: {{ $t.primaryColor }};
            --secondary-color: {{ $t.secondaryColor }};
          }
          .btn-primary, .navbar { background-color: {{ $t.primaryColor }} !important; border-color: {{ $t.primaryColor }} !important; }
          a, .text-primary { color: {{ $t.primaryColor }} !important; }
          {{- if $t.logoUrl }}
          .navbar-brand { background-image: url("{{ $t.logoUrl }}"); background-repeat: no-repeat; background-size: contain; padding-left: 3rem; }
          {{- end }}
      workshopDashboard:
        style: |
          :root {
            --primary-color: {{ $t.primaryColor }};
            --secondary-color: {{ $t.secondaryColor }};
          }
    {{- end }}

{{- end }}
