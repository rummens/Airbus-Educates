# =============================================================================
# educates-openshift — values
# =============================================================================
# Every image, domain, and secret is driven from here. Nothing is hardcoded in
# templates. Defaults run on CRC-with-internet today; going offline requires
# only setting global.registry.host (plus mirroring images — see README).
# =============================================================================

# Master switch for this chart. false = render nothing (toggle the whole chart
# on/off from ArgoCD or helm). Enabled by default.
enabled: true

global:
  registry:
    # Private/mirror registry host. EMPTY = pull from upstream public registries
    # (ghcr.io/educates, docker.io, ghcr.io/loft-sh) — the online default.
    # When set (e.g. "registry.apps-crc.testing" or "myregistry.internal:5000"),
    # ALL image pulls are rewritten to this host:
    #   - the Educates installer imgpkg bundle (which carries every platform image)
    #   - Educates' own imageRegistry.host config field
    #   - workshop content images
    #   - vcluster images (carried inside the installer bundle)
    host: ""
    # Name of an EXISTING pull secret (dockerconfigjson) for the private registry.
    # Optional. Must exist in the installer namespace (educates.installer.namespace)
    # so kapp-controller can pull the bundle, and is wired into Educates'
    # clusterSecrets.pullSecretRefs so workloads pull too. Never put creds here.
    pullSecret: ""

# -----------------------------------------------------------------------------
# Educates platform install (phase 1 — always on)
# -----------------------------------------------------------------------------
educates:
  # Pinned Educates release. Drives the installer bundle tag AND the image tags
  # Educates builds via imageRegistry (config.version). Keep in sync with Chart appVersion.
  version: "3.7.2"

  # Cluster wildcard ingress domain. Default = the x86 test cluster; override per
  # cluster (CRC uses apps-crc.testing).
  ingressDomain: apps-crc.testing

  # Ingress protocol + TLS. https makes Educates put TLS on every ingress (portal
  # AND each workshop session) so the OpenShift Router edge-terminates with a real
  # cert. tlsCertificateRef points at a wildcard cert secret; Educates copies it
  # into each portal/session namespace. Default = the x86 cluster's router cert;
  # override per cluster (CRC uses router-certs-default). protocol: http disables TLS.
  ingress:
    protocol: https
    tlsCertificateRef:
      name: router-certs-default
      namespace: openshift-ingress
    # Extra trusted CA for workshop sessions. Set this to the CA (root/issuing)
    # that signs your INTERNAL endpoints — a private GitLab or Harbor behind your
    # own CA. Educates builds it into every session's trust store and mounts it
    # into the vendir content-download step, so `spec.workshop.files` git/http
    # pulls over HTTPS stop failing x509 "unknown authority". Empty = public CAs
    # only. Provide the PEM inline (one or more certs), OR point caCertificateRef
    # at an existing Secret with a `ca.crt` key (inline wins if both set).
    #
    # Three ways to supply it (first non-empty wins):
    #   1. caCertificate — inline PEM. Simple, but commits the cert to git.
    #   2. caCertificateRef — a Secret (key: ca.crt) you create out-of-band
    #      (`oc create secret generic org-ca -n dcs-educates-installer
    #        --from-file=ca.crt=org-ca.pem`). Cert stays out of git.
    #   3. caFromClusterBundle — let OpenShift own it (cleanest, nothing in git):
    #      the chart creates a ConfigMap labelled
    #      config.openshift.io/inject-trusted-cabundle=true (the Cluster Network
    #      Operator fills its ca-bundle.crt with the system + custom cluster CAs),
    #      and a small hook Job copies that bundle into the ca.crt Secret Educates
    #      reads. Educates can't read a ConfigMap for this directly, hence the copy.
    caCertificate: ""            # 1) inline PEM, e.g. |-\n  -----BEGIN CERTIFICATE-----\n  ...
    caCertificateRef:            # 2) existing Secret ref (key: ca.crt)
      name: ""
      namespace: ""
    caFromClusterBundle: true   # 3) sync the cluster trust bundle into the CA Secret

  # Image + settings for the caFromClusterBundle sync Job (option 3 above). Needs
  # `oc`. registry.redhat.io/ose-cli is pullable on most clusters; mirror for air-gap.
  caBundleSync:
    image: registry.redhat.io/openshift4/ose-cli:latest

  # UI theming stubs. Injected into the Educates platform websiteStyling so the
  # portal + workshop dashboard pick up brand colors and a logo. Selectors are a
  # best-effort starting point — tweak the CSS in 25-theming for exact elements.
  theming:
    enabled: false
    primaryColor: "#0a5ed7"
    secondaryColor: "#6c757d"
    # Logo shown in the portal/dashboard header. Full URL or a data: URI.
    logoUrl: ""

  # Infrastructure provider profile in the Educates installer. "openshift" forces
  # SCC-based security and disables contour/cert-manager/external-dns by default.
  provider: openshift

  security:
    # MUST be security-context-constraints on OpenShift (the provider forces this
    # too; set explicitly for clarity).
    policyEngine: security-context-constraints
    # Workshop rules engine. kyverno is off on OpenShift, so this MUST be "none".
    rulesEngine: none

  # Educates' OWN platform image-registry config. Only emitted into the Educates
  # config when global.registry.host is set (air-gap). namespace is the repo path
  # segment under the registry where educates-<component>:<version> images live
  # after mirroring (see README mirroring steps).
  imageRegistry:
    namespace: educates

  installer:
    # Namespace the kapp-controller installer App + RBAC + config secret live in.
    # dcs- prefix marks it as a static platform namespace we create.
    namespace: dcs-educates-installer
    # Base repo for the installer imgpkg bundle. When global.registry.host is set,
    # the host is swapped but this path is preserved (mirror to <host>/<this>).
    bundleRepository: ghcr.io/educates/educates-installer

  # kapp-controller must already be present on the cluster (see README prereqs).
  # This chart renders the App CR that kapp-controller reconciles.
#
# NOTE: the TrainingPortal, Workshops, and the OpenShift-OAuth proxy live in the
# separate `educates-workshops` chart. This chart is platform-only (installer +
# monitoring). See ../educates-workshops.

# -----------------------------------------------------------------------------
# Monitoring — ServiceMonitor + custom-resource metrics + Grafana bridge
# -----------------------------------------------------------------------------
# Deploys a kube-state-metrics (custom-resource-state-only) that turns the
# training.educates.dev CRs into Prometheus metrics — notably
# educates_workshopsession_info, from which the Grafana dashboard counts running
# workshops (total and per workshop type). A ServiceMonitor exposes it to the
# cluster's user-workload monitoring (which must be enabled: set
# enableUserWorkload: true in the openshift-monitoring cluster-monitoring-config).
# Backend pod/deployment health is read from the platform kube-state-metrics via
# the same Thanos datasource — no extra scrape needed for that.
monitoring:
  enabled: true
  # kube-state-metrics image. Registry-overridable like every other image:
  # empty resolves to <ksmRegistry>/<ksmRepository>:<ksmTag>, or the override host.
  ksmImage: ""
  ksmRepository: kube-state-metrics/kube-state-metrics
  ksmRegistry: registry.k8s.io
  ksmTag: "v2.14.0"
  grafanaReader:
    # ServiceAccount + cluster-monitoring-view + long-lived token Secret for an
    # external Grafana Prometheus datasource pointed at the Thanos Querier route.
    enabled: true
