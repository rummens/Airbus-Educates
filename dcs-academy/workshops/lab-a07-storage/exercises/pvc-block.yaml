apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hello-dcs-block
  labels:
    app: hello-dcs
spec:
  # Block storage is ReadWriteOnce — a single node mounts it at a time (single-writer).
  accessModes:
  - ReadWriteOnce
  # Storage-class name comes from the DCS_SC_BLOCK env var — never hardcode it.
  storageClassName: ${DCS_SC_BLOCK}
  resources:
    requests:
      storage: 1Gi
