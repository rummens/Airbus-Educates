# Representative DCS PROD policy. It applies ONLY to namespaces labelled
# dcs.airbus/namespace-type: prod, and requires every Deployment there to carry a
# data-classification label. DEV namespaces have no such gate. On real DCS the PROD
# policy set is richer; this one stands in so the DEV-vs-PROD difference is tangible.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: prod-require-data-classification
spec:
  validationFailureAction: Enforce
  background: false
  rules:
  - name: require-data-classification
    match:
      any:
      - resources:
          kinds:
          - Deployment
          namespaceSelector:
            matchLabels:
              dcs.airbus/namespace-type: prod
    validate:
      message: "PROD workloads must carry a 'data-classification' label. Promote a compliant manifest from DEV — do not edit in place."
      pattern:
        metadata:
          labels:
            data-classification: "?*"
