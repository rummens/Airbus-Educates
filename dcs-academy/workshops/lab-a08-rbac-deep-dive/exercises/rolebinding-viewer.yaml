apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-viewer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-viewer-binding
# roleRef points at the Role (permissions); subjects lists who gets them.
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-service-viewer
subjects:
- kind: ServiceAccount
  name: app-viewer
