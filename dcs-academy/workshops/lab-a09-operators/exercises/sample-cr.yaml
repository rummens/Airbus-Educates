# A CloudNativePG Cluster — a Custom Resource. The CloudNativePG operator watches this and
# creates/manages the actual PostgreSQL pods, service, and config for you. This spec is the
# part YOU (the instance owner) control: size, instances, storage.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: demo-db
spec:
  instances: 1
  # Operand image from the DCS Harbor registry (air-gapped — no external pulls).
  imageName: ${DCS_REGISTRY}/cnpg/postgresql:16
  storage:
    size: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 256Mi
