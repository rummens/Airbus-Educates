apiVersion: v1
kind: ServiceAccount
metadata:
  name: build-bot
  namespace: image-builds
---
# Long-lived token for GitLab CI ($OC_TOKEN). OpenShift 4.11+ no longer auto-mints
# SA token secrets, so we request one explicitly.
# Retrieve:  oc -n image-builds get secret build-bot-token -o jsonpath='{.data.token}' | base64 -d
# ponytail: non-expiring token — rotate periodically, or switch CI to GitLab
#           OIDC federation + `oc create token` if you want short-lived creds.
apiVersion: v1
kind: Secret
metadata:
  name: build-bot-token
  namespace: image-builds
  annotations:
    kubernetes.io/service-account.name: build-bot
type: kubernetes.io/service-account-token
